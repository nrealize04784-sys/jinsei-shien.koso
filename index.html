<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#1f1f1f"><title>REALIZE OS ― 人生支援構想</title><style>
:root{ --bg:#2b2b2b; --card:#fdfcf7; --ink:#222; --accent:#20365c; --gold:#b0904f;
       --bar:#1f1f1f; }

  font-feature-settings:normal; -webkit-font-smoothing:antialiased; color:var(--ink); }

  width:min(92vw,560px); height:min(76vh,760px);
  background:var(--card); border-radius:3px; box-shadow:0 3px 14px rgba(0,0,0,.45);
  margin:0 auto 16px; padding:26px 22px; overflow:hidden;
  writing-mode:vertical-rl; -webkit-writing-mode:vertical-rl; -ms-writing-mode:tb-rl;
  text-orientation:upright; -webkit-text-orientation:upright;
  font-size:18pt; line-height:1.85; letter-spacing:0; text-align:justify; }

  letter-spacing:.2em; }

/* cover / chapter / end special cards */
.page.cover{ writing-mode:horizontal-tb; background:#0b1526; padding:0; overflow:hidden; }

  display:block; white-space:nowrap; margin:0 15px; }

/* side nav buttons */

/* TOC drawer */

  visibility:hidden; transition:opacity .22s; }

.drawer{ position:fixed; top:0; bottom:0; left:0; z-index:50; width:min(80vw,320px);

</style></head><body><div class="topbar"><button class="menu" id="menu" aria-label="目次">&#9776;</button><span class="ttl"><b>REALIZE&nbsp;OS</b>　人生支援構想</span><span class="pgt" id="pgt">…</span></div><div id="reader"></div><div class="nav"><button id="prev" aria-label="前へ">&#9650;</button><button id="next" aria-label="次へ">&#9660;</button></div><div class="scrim" id="scrim"></div><nav class="drawer" id="drawer"><div class="dh"><span>目&#12288;次</span><button class="x" id="dx" aria-label="閉じる">&times;</button></div><div class="dlist" id="dlist"></div></nav><script>
var FLOW=[{"k": "chap", "no": "", "title": "序文", "sub": "", "label": "序文"}, {"k": "para", "s": "時代は変わった。"}, {"k": "para", "s": "人生80年時代から、人生100年時代へ。"}, {"k": "para", "s": "寿命が延びたことだけが変化ではない。"}, {"k": "para", "s": "働き方は変わり、家族の形は変わり、地域とのつながりは薄れ、情報はあふれ、人生で求められる判断は、かつてないほど複雑になった。"}, {"k": "para", "s": "それにもかかわらず、私たちが学校で学ぶこと、会社で教わること、社会の仕組みの多くは、人生80年時代を前提につくられたままである。"}, {"k": "para", "s": "その結果、多くの人が努力しているにもかかわらず、将来への漠然とした不安を抱え、何を基準に判断すればよいのかわからずにいる。"}, {"k": "para", "s": "私たちは、この問題の本質を「能力不足」でも「努力不足」でもなく、**「判断軸不足」**にあると考えた。"}, {"k": "para", "s": "だからこそ必要なのは、困ってから助ける社会ではない。"}, {"k": "para", "s": "困っても乗り越えられる力を育てる社会。"}, {"k": "para", "s": "人生を支える新しい社会インフラ。"}, {"k": "para", "s": "それが、人生支援構想である。"}, {"k": "para", "s": "そして、その構想を実現する基盤が、REALIZE OSである。"}, {"k": "para", "s": "私たちは信じている。"}, {"k": "para", "s": "人生は、今日の小さな判断の積み重ねでつくられる。"}, {"k": "para", "s": "だからこそ、一人でも多くの人が正しい判断軸を持ち、安心して挑戦し、家族を守り、次の世代へ希望をつないでいける社会を実現したい。"}, {"k": "para", "s": "この本は、その未来への設計図である。"}, {"k": "chap", "no": "第一章", "title": "人生100年時代という構造変化", "sub": "", "label": "第一章　人生100年時代という構造変化"}, {"k": "para", "s": "「寿命」が変わったのではない。"}, {"k": "para", "s": "「人生の構造」が変わった。"}, {"k": "para", "s": "多くの人は、人生100年時代と聞くと、「長生きする時代になった」と考える。"}, {"k": "para", "s": "もちろん、それも一つの事実である。"}, {"k": "para", "s": "しかし、REALIZE OSが伝えたいことは、そこではない。"}, {"k": "para", "s": "本当に変わったのは寿命ではない。"}, {"k": "para", "s": "人生そのものの構造である。"}, {"k": "para", "s": "昭和から平成にかけて、日本社会は「人生80年時代」を前提に設計されていた。"}, {"k": "para", "s": "学校を卒業し、会社に就職し、結婚して子どもを育て、定年退職を迎え、年金を受け取りながら老後を過ごす。"}, {"k": "para", "s": "もちろん個人差はあったが、多くの人が同じような人生を歩んでいた。"}, {"k": "para", "s": "社会制度も、企業も、教育も、その前提でつくられていた。"}, {"k": "para", "s": "努力をすれば生活は豊かになりやすく、貯蓄を続ければ将来への見通しも立てやすかった。"}, {"k": "para", "s": "人生は一本道だった。"}, {"k": "para", "s": "しかし、人生100年時代では、その前提が大きく変わった。"}, {"k": "para", "s": "転職は当たり前になり、副業という選択肢も生まれた。"}, {"k": "para", "s": "AIは仕事の在り方を変え始めている。"}, {"k": "para", "s": "物価は上がり、税や社会保険料の負担も増え続けている。"}, {"k": "para", "s": "住宅価格は高騰し、教育費や介護費への備えも欠かせない。"}, {"k": "para", "s": "さらに、人生そのものが長くなったことで、「老後」は数年ではなく、30年近く続く可能性もある。"}, {"k": "para", "s": "情報は爆発的に増えた。"}, {"k": "para", "s": "SNSを開けば、毎日のように新しい価値観や成功法則が流れてくる。"}, {"k": "para", "s": "しかし、情報が増えたからといって、人々の不安が減ったわけではない。"}, {"k": "para", "s": "むしろ、多くの人が「何を信じればいいのかわからない」という状態に置かれている。"}, {"k": "para", "s": "つまり、人生100年時代とは、「選択肢が増えた時代」であると同時に、「判断が難しくなった時代」なのである。"}, {"k": "head", "cls": "sec", "s": "人生は「判断の連続」でできている"}, {"k": "para", "s": "私たちは日々、数え切れないほどの判断をしている。"}, {"k": "para", "s": "進学するか。"}, {"k": "para", "s": "就職するか。"}, {"k": "para", "s": "転職するか。"}, {"k": "para", "s": "結婚するか。"}, {"k": "para", "s": "子どもを持つか。"}, {"k": "para", "s": "家を買うか。"}, {"k": "para", "s": "賃貸に住み続けるか。"}, {"k": "para", "s": "保険に入るか。"}, {"k": "para", "s": "資産形成を始めるか。"}, {"k": "para", "s": "親の介護をどうするか。"}, {"k": "para", "s": "健康のために何を選ぶか。"}, {"k": "para", "s": "一つひとつは小さな判断かもしれない。"}, {"k": "para", "s": "しかし、その積み重ねが10年後、20年後、そして人生そのものを形づくっていく。"}, {"k": "para", "s": "人生は偶然ではなく、判断の積み重ねなのである。"}, {"k": "head", "cls": "sec", "s": "昔は、社会が判断を代わりにしてくれた"}, {"k": "para", "s": "人生80年時代には、「正解」が比較的わかりやすかった。"}, {"k": "para", "s": "良い学校へ行く。"}, {"k": "para", "s": "良い会社へ入る。"}, {"k": "para", "s": "真面目に働く。"}, {"k": "para", "s": "結婚する。"}, {"k": "para", "s": "子どもを育てる。"}, {"k": "para", "s": "貯金をする。"}, {"k": "para", "s": "こうした選択は、多くの人にとって合理的な判断だった。"}, {"k": "para", "s": "社会そのものが、一つの方向へ進んでいたからである。"}, {"k": "para", "s": "つまり、社会が人生の判断をある程度代わりにしてくれていた。"}, {"k": "para", "s": "しかし、人生100年時代では違う。"}, {"k": "para", "s": "正解は一つではない。"}, {"k": "para", "s": "働き方も、お金の管理も、住まいの選び方も、家族の形も、人それぞれになった。"}, {"k": "para", "s": "自由になった反面、自分自身で判断しなければならない場面が圧倒的に増えた。"}, {"k": "para", "s": "だからこそ、必要なのは「情報量」ではない。"}, {"k": "para", "s": "判断軸である。"}, {"k": "head", "cls": "sec", "s": "現代人に足りないもの"}, {"k": "para", "s": "私たちは、多くの人に出会い、暮らしの現場に触れ続けてきた。"}, {"k": "para", "s": "住宅の相談。"}, {"k": "para", "s": "家計の相談。"}, {"k": "para", "s": "将来への不安。"}, {"k": "para", "s": "家族の悩み。"}, {"k": "para", "s": "仕事の悩み。"}, {"k": "para", "s": "その中で見えてきた共通点がある。"}, {"k": "para", "s": "困っている人は、能力が低いわけではない。"}, {"k": "para", "s": "努力していないわけでもない。"}, {"k": "para", "s": "情報を持っていないわけでもない。"}, {"k": "para", "s": "「何を基準に判断すればいいのか」がわからないだけなのである。"}, {"k": "para", "s": "だから、間違った情報に流される。"}, {"k": "para", "s": "だから、目先の損得だけで判断してしまう。"}, {"k": "para", "s": "だから、将来になって後悔する。"}, {"k": "para", "s": "これは個人の問題ではない。"}, {"k": "para", "s": "人生100年時代に対して、社会の基礎教育が追いついていないという構造の問題なのである。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSが向き合う課題"}, {"k": "para", "s": "私たちは、この構造そのものを変えたいと考えている。"}, {"k": "para", "s": "人生100年時代を生きるために必要なのは、人生を諦めない精神論ではない。"}, {"k": "para", "s": "誰かの成功体験をそのまま真似することでもない。"}, {"k": "para", "s": "人生のあらゆる場面で、自分自身の価値観と現実を照らし合わせながら、納得して判断できる力を身につけることである。"}, {"k": "para", "s": "その力があれば、人は困難に直面しても、自ら考え、選び、乗り越えていくことができる。"}, {"k": "para", "s": "私たちは、その力を社会全体に届けたい。"}, {"k": "para", "s": "それが、人生支援構想の出発点である。"}, {"k": "head", "cls": "sec", "s": "第一章の結び"}, {"k": "para", "s": "人生100年時代とは、長生きする時代ではない。"}, {"k": "para", "s": "判断する時代である。"}, {"k": "para", "s": "だからこそ、これからの社会に必要なのは、知識だけでも、制度だけでもない。"}, {"k": "para", "s": "人生を支える判断軸である。"}, {"k": "para", "s": "そして、その判断軸を、一人ひとりが手に入れられる社会をつくること。"}, {"k": "para", "s": "それが、REALIZE OSが目指す未来である。"}, {"k": "chap", "no": "第二章", "title": "人生支援とは何か", "sub": "「人生支援」という新しい社会インフラ", "label": "第二章　人生支援とは何か"}, {"k": "head", "cls": "sec", "s": "人生支援という言葉"}, {"k": "para", "s": "私たちは、「人生支援」という言葉を使っている。"}, {"k": "para", "s": "しかし、この言葉はまだ社会に明確な定義が存在していない。"}, {"k": "para", "s": "介護支援はある。"}, {"k": "para", "s": "子育て支援もある。"}, {"k": "para", "s": "就労支援もある。"}, {"k": "para", "s": "生活困窮者支援もある。"}, {"k": "para", "s": "しかし、それらは人生の一部分を支える仕組みである。"}, {"k": "para", "s": "私たちが目指す人生支援は、それらとは少し違う。"}, {"k": "para", "s": "人生全体を支える仕組みである。"}, {"k": "head", "cls": "sec", "s": "人生は、一つの問題だけではできていない"}, {"k": "para", "s": "人生を振り返ると、人は様々な出来事と向き合う。"}, {"k": "para", "s": "進学。"}, {"k": "para", "s": "就職。"}, {"k": "para", "s": "結婚。"}, {"k": "para", "s": "出産。"}, {"k": "para", "s": "住宅購入。"}, {"k": "para", "s": "転職。"}, {"k": "para", "s": "親の介護。"}, {"k": "para", "s": "子どもの教育。"}, {"k": "para", "s": "病気。"}, {"k": "para", "s": "災害。"}, {"k": "para", "s": "老後。"}, {"k": "para", "s": "そして人生の終わり。"}, {"k": "para", "s": "それぞれが独立した問題ではない。"}, {"k": "para", "s": "すべてがつながっている。"}, {"k": "para", "s": "例えば、お金の問題は住まいに影響する。"}, {"k": "para", "s": "住まいは子育てに影響する。"}, {"k": "para", "s": "子育ては夫婦関係に影響する。"}, {"k": "para", "s": "夫婦関係は子どもの人格形成にも影響する。"}, {"k": "para", "s": "健康は働き方に影響する。"}, {"k": "para", "s": "老後の備えは現役世代の家計に影響する。"}, {"k": "para", "s": "人生とは、一つの判断が次の判断へ連鎖していく構造なのである。"}, {"k": "para", "s": "だから、一部分だけを最適化しても、本当の意味で人生は良くならない。"}, {"k": "para", "s": "人生全体を見渡す視点が必要なのである。"}, {"k": "head", "cls": "sec", "s": "人生支援の定義"}, {"k": "para", "s": "REALIZE OSでは、人生支援を次のように定義する。"}, {"k": "para", "s": "人生支援とは、一人ひとりが人生100年時代を自分らしく生き抜くために、正しい判断軸を身につけ、必要な知識・設計・相談・伴走を継続的に提供することである。"}, {"k": "para", "s": "この定義には、三つの要素がある。"}, {"k": "para", "s": "第一に、「判断軸」。"}, {"k": "para", "s": "第二に、「継続性」。"}, {"k": "para", "s": "第三に、「自立を支えること」。"}, {"k": "head", "cls": "sec", "s": "支援とは「代わりに決めること」ではない"}, {"k": "para", "s": "支援という言葉を聞くと、多くの人は「助けてもらうこと」を思い浮かべる。"}, {"k": "para", "s": "しかし、私たちの考える支援は違う。"}, {"k": "para", "s": "支援とは、依存を生むことではない。"}, {"k": "para", "s": "支援とは、自立を育てることである。"}, {"k": "para", "s": "魚を与えるのではなく、魚の釣り方を教える。"}, {"k": "para", "s": "答えを渡すのではなく、判断できる力を育てる。"}, {"k": "para", "s": "一時的に助けるのではなく、人生を通じて伴走する。"}, {"k": "para", "s": "これが、人生支援の本質である。"}, {"k": "head", "cls": "sec", "s": "人生支援は「予防」である"}, {"k": "para", "s": "医療には予防医学という考え方がある。"}, {"k": "para", "s": "病気になってから治療するだけでなく、病気にならないために健康を維持する。"}, {"k": "para", "s": "人生も同じではないだろうか。"}, {"k": "para", "s": "多くの人は、問題が起きてから相談する。"}, {"k": "para", "s": "住宅ローンが払えなくなってから。"}, {"k": "para", "s": "夫婦関係が壊れてから。"}, {"k": "para", "s": "老後資金が足りなくなってから。"}, {"k": "para", "s": "しかし、本当に必要なのは、その前である。"}, {"k": "para", "s": "人生支援とは、問題を未然に防ぎ、困難に備える力を育てる「予防」の考え方なのである。"}, {"k": "para", "s": "教育・診断・伴走・相談は、すべて一つにつながるREALIZE OSでは、人生支援を次の流れで考える。"}, {"k": "para", "s": "まず、自分の現状を知る。"}, {"k": "para", "s": "人生健康診断によって課題を見つける。"}, {"k": "para", "s": "次に、AIや専門家が伴走し、その人の状況や性格に合わせたアドバイスを行う。"}, {"k": "para", "s": "その上で、人生100年時代に必要な知識を学び、判断軸を育てる。"}, {"k": "para", "s": "そして、未来を見据えた人生設計を行い、必要に応じて専門家へ相談し、実際の行動へとつなげる。"}, {"k": "para", "s": "これらはバラバラのサービスではない。"}, {"k": "para", "s": "すべてが一つの人生支援メソッドとして設計されている。"}, {"k": "head", "cls": "sec", "s": "人生支援は、新しい社会インフラである"}, {"k": "para", "s": "道路や電気、水道が社会を支えてきたように、これからの時代には、人の人生そのものを支える基盤が必要になる。"}, {"k": "para", "s": "学校だけでは足りない。"}, {"k": "para", "s": "会社だけでも足りない。"}, {"k": "para", "s": "行政だけでも足りない。"}, {"k": "para", "s": "家族だけでも支えきれない。"}, {"k": "para", "s": "だからこそ、人生支援という新しい社会インフラが求められている。"}, {"k": "para", "s": "私たちは、その役割を担いたいと考えている。"}, {"k": "head", "cls": "sec", "s": "人生支援が目指す社会"}, {"k": "para", "s": "人生支援が広がることで、社会はどう変わるのか。"}, {"k": "para", "s": "人は、将来への不安を一人で抱え込まなくなる。"}, {"k": "para", "s": "人生の重要な判断を、安心して相談できるようになる。"}, {"k": "para", "s": "家計の安定は、心の余裕につながる。"}, {"k": "para", "s": "心の余裕は、家族の笑顔につながる。"}, {"k": "para", "s": "家族の笑顔は、子どもたちの安心につながる。"}, {"k": "para", "s": "子どもたちの安心は、未来の社会を変えていく。"}, {"k": "para", "s": "人生支援とは、一人の人生を支えるだけではない。"}, {"k": "para", "s": "次の世代へ希望をつなぐ社会づくりなのである。"}, {"k": "head", "cls": "sec", "s": "第二章の結び"}, {"k": "para", "s": "人生支援とは、誰かの人生を代わりに生きることではない。"}, {"k": "para", "s": "その人が、自分自身の人生を、自分の意思で、自信を持って歩めるよう支えることである。"}, {"k": "para", "s": "私たちは、人を依存させる仕組みではなく、自立を育てる仕組みをつくりたい。"}, {"k": "para", "s": "人生100年時代に必要なのは、「助け続ける社会」ではない。"}, {"k": "para", "s": "一人ひとりが、自らの人生を切り拓ける社会である。"}, {"k": "para", "s": "その土台となるのが、人生支援という新しい社会インフラなのである。"}, {"k": "chap", "no": "第三章", "title": "人生支援産業という新しい産業", "sub": "人生100年時代の社会インフラを担う産業", "label": "第三章　人生支援産業という新しい産業"}, {"k": "head", "cls": "sec", "s": "産業は、時代の課題から生まれる"}, {"k": "para", "s": "歴史を振り返ると、新しい産業は、必ずその時代の課題から生まれてきた。"}, {"k": "para", "s": "農業は、人が生きるための「食」を支えた。"}, {"k": "para", "s": "製造業は、暮らしを豊かにする「モノ」を生み出した。"}, {"k": "para", "s": "物流業は、人とモノをつないだ。"}, {"k": "para", "s": "金融業は、お金の流れを支えた。"}, {"k": "para", "s": "IT産業は、情報を世界中につないだ。"}, {"k": "para", "s": "そしてAIは、人の知的活動を支え始めている。"}, {"k": "para", "s": "社会が変わるたびに、新しい産業が生まれ、人々の暮らしを支えてきた。"}, {"k": "para", "s": "では、人生100年時代の社会課題を支える産業は何だろうか。"}, {"k": "head", "cls": "sec", "s": "人生100年時代が生んだ、新しい課題"}, {"k": "para", "s": "人生100年時代では、人生そのものが複雑になった。"}, {"k": "para", "s": "長寿化。"}, {"k": "para", "s": "働き方の多様化。"}, {"k": "para", "s": "情報の爆発的な増加。"}, {"k": "para", "s": "価値観の多様化。"}, {"k": "para", "s": "家族構成の変化。"}, {"k": "para", "s": "地域とのつながりの希薄化。"}, {"k": "para", "s": "これらの変化によって、人は人生で何度も大きな判断を迫られるようになった。"}, {"k": "para", "s": "しかし、その判断を支える仕組みは十分とは言えない。"}, {"k": "para", "s": "学校は、人生を教える場所ではない。"}, {"k": "para", "s": "企業は、社員の人生全体を支えるために存在しているわけではない。"}, {"k": "para", "s": "行政は、制度を提供する役割を担うが、一人ひとりに継続して伴走することは難しい。"}, {"k": "para", "s": "家族も、昔ほど多くの知識や経験を共有できる環境ではなくなった。"}, {"k": "para", "s": "つまり、人生100年時代には、「人生を継続的に支える存在」が社会から抜け落ちてしまっているのである。"}, {"k": "head", "cls": "sec", "s": "人生支援産業とは何か"}, {"k": "para", "s": "REALIZE OSでは、「人生支援産業」を次のように定義する。"}, {"k": "para", "s": "人生支援産業とは、人々が人生100年時代を安心して生き抜くために、教育・診断・設計・相談・伴走を継続的に提供し、より良い判断と行動を支える産業である。"}, {"k": "para", "s": "この産業の目的は、商品を売ることではない。"}, {"k": "para", "s": "困っている人だけを助けることでもない。"}, {"k": "para", "s": "一人ひとりが、自分らしい人生を築く力を育てることである。"}, {"k": "head", "cls": "sec", "s": "人生支援産業は「人生」を商品にしない"}, {"k": "para", "s": "ここで、誤解してほしくないことがある。"}, {"k": "para", "s": "人生支援産業は、人の不安を利用して利益を得る産業ではない。"}, {"k": "para", "s": "人生を商品として扱う産業でもない。"}, {"k": "para", "s": "私たちが提供する価値は、「安心して判断できる環境」である。"}, {"k": "para", "s": "知識を届ける。"}, {"k": "para", "s": "選択肢を整理する。"}, {"k": "para", "s": "未来を設計する。"}, {"k": "para", "s": "困ったときには相談できる。"}, {"k": "para", "s": "必要な専門家へつなぐ。"}, {"k": "para", "s": "つまり、人を支配するのではなく、人が自分で選べる状態をつくる。"}, {"k": "para", "s": "それが人生支援産業の本質である。"}, {"k": "head", "cls": "sec", "s": "人生支援産業は「つなぐ産業」である"}, {"k": "para", "s": "現代社会には、優れたサービスが数多く存在する。"}, {"k": "para", "s": "住宅会社。"}, {"k": "para", "s": "保険会社。"}, {"k": "para", "s": "金融機関。"}, {"k": "para", "s": "医療機関。"}, {"k": "para", "s": "介護事業者。"}, {"k": "para", "s": "教育機関。"}, {"k": "para", "s": "カウンセラー。"}, {"k": "para", "s": "士業。"}, {"k": "para", "s": "それぞれが高い専門性を持っている。"}, {"k": "para", "s": "しかし、多くの人は、自分にとって「今、何が必要なのか」を判断することが難しい。"}, {"k": "para", "s": "人生支援産業は、それらを競合するのではなく、つなぐ役割を担う。"}, {"k": "para", "s": "人生全体を見渡し、その時々で必要な支援へと橋渡しをする。"}, {"k": "para", "s": "いわば、「人生のナビゲーター」である。"}, {"k": "head", "cls": "sec", "s": "人生支援産業が社会にもたらす価値"}, {"k": "para", "s": "人生支援産業が広がることで、社会には次のような変化が生まれる。"}, {"k": "para", "s": "人生の重要な判断を、一人で抱え込まなくてよくなる。"}, {"k": "para", "s": "家計の安定は、挑戦する余裕につながる。"}, {"k": "para", "s": "夫婦や親子の対話が増え、人間関係の摩擦が減る。"}, {"k": "para", "s": "企業では、社員の安心感が高まり、離職やメンタル不調の予防につながる。"}, {"k": "para", "s": "地域には、気軽に相談できる場所が増える。"}, {"k": "para", "s": "そして、子どもたちは、安心して暮らす大人の背中を見て育つ。"}, {"k": "para", "s": "人生支援産業が支えるのは、「人生」だけではない。"}, {"k": "para", "s": "家庭、企業、地域、そして未来の社会全体である。"}, {"k": "head", "cls": "sec", "s": "人生支援産業は「予防産業」である"}, {"k": "para", "s": "医療には、予防医学という考え方がある。"}, {"k": "para", "s": "病気になる前に健康を守る。"}, {"k": "para", "s": "人生も同じである。"}, {"k": "para", "s": "家計が破綻する前に学ぶ。"}, {"k": "para", "s": "夫婦関係が壊れる前に話し合う。"}, {"k": "para", "s": "老後に困る前に備える。"}, {"k": "para", "s": "災害が起こる前に準備する。"}, {"k": "para", "s": "人生支援産業とは、「困ってから助ける産業」ではない。"}, {"k": "para", "s": "困る前に支える産業なのである。"}, {"k": "para", "s": "人生支援産業は、教育産業でも、福祉産業でもない人生支援産業は、教育だけではない。"}, {"k": "para", "s": "福祉だけでもない。"}, {"k": "para", "s": "医療だけでもない。"}, {"k": "para", "s": "金融だけでもない。"}, {"k": "para", "s": "住まいだけでもない。"}, {"k": "para", "s": "それらすべてを人生という視点でつなぎ合わせる、横断的な産業である。"}, {"k": "para", "s": "だからこそ、一つの専門分野だけでは実現できない。"}, {"k": "para", "s": "多様な専門家、多様なサービス、多様な技術が連携し、一人の人生を支える仕組みが必要になる。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSが目指す役割"}, {"k": "para", "s": "REALIZE OSは、一企業として市場を独占したいわけではない。"}, {"k": "para", "s": "私たちが目指すのは、「人生支援産業」という考え方が社会に根づくことだ。"}, {"k": "para", "s": "企業が社員の人生を支えることが当たり前になる。"}, {"k": "para", "s": "地域に人生相談窓口があることが当たり前になる。"}, {"k": "para", "s": "人生健康診断を受けることが健康診断と同じくらい自然になる。"}, {"k": "para", "s": "子どもたちが人生の基礎教育を学ぶことが当たり前になる。"}, {"k": "para", "s": "私たちは、その未来を実現するための土台をつくりたい。"}, {"k": "head", "cls": "sec", "s": "第三章の結び"}, {"k": "para", "s": "産業とは、利益を生み出す仕組みであると同時に、社会を支える仕組みでもある。"}, {"k": "para", "s": "人生100年時代には、新しい社会課題が生まれた。"}, {"k": "para", "s": "その課題に向き合うためには、新しい産業が必要になる。"}, {"k": "para", "s": "それが、人生支援産業である。"}, {"k": "para", "s": "人生支援産業は、人々の人生を代わりに生きる産業ではない。"}, {"k": "para", "s": "一人ひとりが、自分らしく生きるための力を育てる産業である。"}, {"k": "para", "s": "そして、REALIZE OSは、その産業を支える基盤となることを目指している。"}, {"k": "chap", "no": "第四章", "title": "人生を支える六つの土台", "sub": "人生はバランスの上に成り立っている", "label": "第四章　人生を支える六つの土台"}, {"k": "head", "cls": "sec", "s": "人生は、一つの要素だけでは成り立たない"}, {"k": "para", "s": "人生がうまくいっている人とは、どのような人だろうか。"}, {"k": "para", "s": "お金持ちの人だろうか。"}, {"k": "para", "s": "健康な人だろうか。"}, {"k": "para", "s": "家族に恵まれた人だろうか。"}, {"k": "para", "s": "仕事で成功した人だろうか。"}, {"k": "para", "s": "どれも間違いではない。"}, {"k": "para", "s": "しかし、それだけでは十分ではない。"}, {"k": "para", "s": "どれか一つだけが満たされていても、人生全体が満たされるとは限らない。"}, {"k": "para", "s": "たとえば、多くの資産を持っていても健康を失えば、その豊かさを十分に享受することはできない。"}, {"k": "para", "s": "健康であっても、人間関係が壊れていれば、心の安らぎは得にくい。"}, {"k": "para", "s": "仕事で成功しても、家庭が崩れてしまえば、心から幸せだとは感じられないかもしれない。"}, {"k": "para", "s": "人生は、一つの成功で決まるものではない。"}, {"k": "para", "s": "複数の土台が支え合うことで、初めて安定する。"}, {"k": "head", "cls": "sec", "s": "人生には「土台」がある"}, {"k": "para", "s": "家を建てるとき、どれほど立派な建物を設計しても、基礎が弱ければ長くは持たない。"}, {"k": "para", "s": "人生も同じである。"}, {"k": "para", "s": "夢や目標は建物だとすれば、その土台が不安定では、大きな挑戦を支えることはできない。"}, {"k": "para", "s": "REALIZE OSでは、この人生の基礎を「六つの土台」と定義する。"}, {"k": "para", "s": "それは、多くの人の人生相談や暮らしの現場から見えてきた、人生を支える共通の要素である。"}, {"k": "head", "cls": "kicker", "s": "第一の土台"}, {"k": "head", "cls": "dai", "s": "お金"}, {"k": "para", "s": "お金は人生の目的ではない。"}, {"k": "para", "s": "しかし、お金がなければ選択肢は狭くなる。"}, {"k": "para", "s": "生活費。"}, {"k": "para", "s": "教育費。"}, {"k": "para", "s": "医療費。"}, {"k": "para", "s": "住宅費。"}, {"k": "para", "s": "老後資金。"}, {"k": "para", "s": "現実の人生には、お金が深く関わっている。"}, {"k": "para", "s": "家計に余裕があれば、心にも余裕が生まれる。"}, {"k": "para", "s": "反対に、お金への不安は、夫婦関係や子育て、仕事、健康にも影響を及ぼす。"}, {"k": "para", "s": "だからこそ、お金を「増やす」ことよりも、「守る」「整える」ことが重要になる。"}, {"k": "para", "s": "人生支援とは、家計を整え、人生の選択肢を守ることである。"}, {"k": "head", "cls": "kicker", "s": "第二の土台"}, {"k": "head", "cls": "dai", "s": "住まい"}, {"k": "para", "s": "住まいとは、単なる建物ではない。"}, {"k": "para", "s": "家族が安心して帰る場所であり、人生の思い出を育む場所である。"}, {"k": "para", "s": "子どもの人格形成にも影響し、夫婦の時間を育み、老後の安心にもつながる。"}, {"k": "para", "s": "住まいは、人生という器である。"}, {"k": "para", "s": "どのような器を選ぶかによって、その後の人生は大きく変わる。"}, {"k": "para", "s": "だから住まい選びは、不動産を選ぶことではなく、人生を設計することなのである。"}, {"k": "head", "cls": "kicker", "s": "第三の土台"}, {"k": "head", "cls": "dai", "s": "万が一への備え"}, {"k": "para", "s": "人生には、予期せぬ出来事が起こる。"}, {"k": "para", "s": "病気。"}, {"k": "para", "s": "事故。"}, {"k": "para", "s": "失業。"}, {"k": "para", "s": "家族の突然の出来事。"}, {"k": "para", "s": "それらを完全に防ぐことはできない。"}, {"k": "para", "s": "しかし、備えることはできる。"}, {"k": "para", "s": "備えがある人は、困難に直面しても立ち上がりやすい。"}, {"k": "para", "s": "備えがない人は、一度の出来事で人生が大きく揺らぐこともある。"}, {"k": "para", "s": "万が一への備えとは、不安をなくすことではない。"}, {"k": "para", "s": "安心して挑戦できる土台をつくることである。"}, {"k": "head", "cls": "kicker", "s": "第四の土台"}, {"k": "head", "cls": "dai", "s": "老後"}, {"k": "para", "s": "老後とは、人生の終わりではない。"}, {"k": "para", "s": "人生の集大成である。"}, {"k": "para", "s": "どのような場所で暮らすのか。"}, {"k": "para", "s": "どのような人たちに囲まれているのか。"}, {"k": "para", "s": "どのような生活を送りたいのか。"}, {"k": "para", "s": "それは、現役時代の判断によって大きく変わる。"}, {"k": "para", "s": "老後は、突然やって来るものではない。"}, {"k": "para", "s": "今日の積み重ねが、その未来を形づくる。"}, {"k": "para", "s": "だからこそ、老後は若いうちから考えるべきテーマなのである。"}, {"k": "head", "cls": "kicker", "s": "第五の土台"}, {"k": "head", "cls": "dai", "s": "健康"}, {"k": "para", "s": "健康を失ったとき、人は健康の大切さに気づく。"}, {"k": "para", "s": "しかし、本当に大切なのは、失う前に守ることである。"}, {"k": "para", "s": "身体の健康。"}, {"k": "para", "s": "心の健康。"}, {"k": "para", "s": "人間関係の健康。"}, {"k": "para", "s": "生活習慣の健康。"}, {"k": "para", "s": "健康とは、病気でない状態だけを意味しない。"}, {"k": "para", "s": "自分らしく生きる力そのものなのである。"}, {"k": "head", "cls": "kicker", "s": "第六の土台"}, {"k": "head", "cls": "dai", "s": "災害"}, {"k": "para", "s": "日本は、自然災害と共に生きる国である。"}, {"k": "para", "s": "地震。"}, {"k": "para", "s": "台風。"}, {"k": "para", "s": "豪雨。"}, {"k": "para", "s": "火災。"}, {"k": "para", "s": "災害そのものは避けられないかもしれない。"}, {"k": "para", "s": "しかし、被害を減らすことはできる。"}, {"k": "para", "s": "家族で話し合う。"}, {"k": "para", "s": "備蓄をする。"}, {"k": "para", "s": "住まいを見直す。"}, {"k": "para", "s": "保険を確認する。"}, {"k": "para", "s": "「何も起きないこと」を願うだけではなく、「起きても守れる状態」をつくることが人生支援である。"}, {"k": "head", "cls": "sec", "s": "六つは、すべてつながっている"}, {"k": "para", "s": "この六つは、それぞれ独立したテーマではない。"}, {"k": "para", "s": "お金は住まいにつながる。"}, {"k": "para", "s": "住まいは健康につながる。"}, {"k": "para", "s": "健康は働き方につながる。"}, {"k": "para", "s": "働き方は老後につながる。"}, {"k": "para", "s": "老後は家計につながる。"}, {"k": "para", "s": "万が一への備えは、家族の安心につながる。"}, {"k": "para", "s": "災害への備えは、住まいと家計を守る。"}, {"k": "para", "s": "つまり、一つだけを良くしても人生全体は安定しない。"}, {"k": "para", "s": "六つをバランスよく整えることが、人生の安定につながるのである。"}, {"k": "head", "cls": "sec", "s": "六つの土台の上に人生は築かれる"}, {"k": "para", "s": "REALIZE OSでは、この六つを「人生の基礎教育」と位置づける。"}, {"k": "para", "s": "学校で学ぶ教科が、社会で生きるための知識であるように、この六つは、人生を生き抜くための知識である。"}, {"k": "para", "s": "どれか一つだけを学べばよいのではない。"}, {"k": "para", "s": "すべてを知り、自分の人生に合わせて判断できることが大切なのである。"}, {"k": "head", "cls": "sec", "s": "第四章の結び"}, {"k": "para", "s": "人生は、夢や目標だけでは支えられない。"}, {"k": "para", "s": "夢を支える土台が必要である。"}, {"k": "para", "s": "その土台が、お金、住まい、万が一への備え、老後、健康、災害という六つのテーマである。"}, {"k": "para", "s": "この六つを学び、整え、守ることができれば、人は安心して挑戦できる。"}, {"k": "para", "s": "そして、その挑戦の先に、自分らしい人生がある。"}, {"k": "para", "s": "REALIZE OSは、この六つの土台を支え続けるために存在する。"}, {"k": "chap", "no": "第五章", "title": "人生健康診断", "sub": "人生を守るために、人生を診る", "label": "第五章　人生健康診断"}, {"k": "head", "cls": "sec", "s": "健康診断は、なぜ受けるのか"}, {"k": "para", "s": "私たちは毎年、健康診断を受ける。"}, {"k": "para", "s": "体調が悪いからではない。"}, {"k": "para", "s": "病気だからでもない。"}, {"k": "para", "s": "健康だと思っていても受ける。"}, {"k": "para", "s": "なぜなら、自覚症状がなくても、病気は静かに進行することがあるからだ。"}, {"k": "para", "s": "早く見つければ治療できる。"}, {"k": "para", "s": "早く気づけば改善できる。"}, {"k": "para", "s": "だから健康診断は、「病気になった人のため」"}, {"k": "para", "s": "ではなく、健康を守る人のために存在している。"}, {"k": "head", "cls": "sec", "s": "人生にも健康診断は必要ではないか"}, {"k": "para", "s": "では、人生はどうだろう。"}, {"k": "para", "s": "多くの人は、お金に困ってから考える。"}, {"k": "para", "s": "住宅ローンが苦しくなってから考える。"}, {"k": "para", "s": "夫婦関係が悪くなってから相談する。"}, {"k": "para", "s": "老後が近づいてから焦る。"}, {"k": "para", "s": "病気になって健康の大切さに気づく。"}, {"k": "para", "s": "災害が起きてから備え始める。"}, {"k": "para", "s": "つまり、人生は、問題が起きてから動く社会になっている。"}, {"k": "para", "s": "しかし、もし人生にも健康診断があればどうだろう。"}, {"k": "para", "s": "問題になる前に気づける。"}, {"k": "para", "s": "判断を修正できる。"}, {"k": "para", "s": "未来を変えられる。"}, {"k": "para", "s": "人生健康診断とはREALIZE OSでは、人生健康診断を次のように定義する。"}, {"k": "para", "s": "人生健康診断とは、人生100年時代を安心して生きるために、人生の六つの土台の現在地を可視化し、未来のリスクと可能性を明らかにする診断である。"}, {"k": "para", "s": "健康診断が身体を診るように、人生健康診断は、人生そのものを診る。"}, {"k": "head", "cls": "sec", "s": "人生健康診断は点数をつけるためではない"}, {"k": "para", "s": "診断という言葉を聞くと、良い悪い合格不合格をイメージする人もいる。"}, {"k": "para", "s": "しかし、人生健康診断は違う。"}, {"k": "para", "s": "評価するためではない。"}, {"k": "para", "s": "気づくためにある。"}, {"k": "para", "s": "今の自分を知る。"}, {"k": "para", "s": "未来を知る。"}, {"k": "para", "s": "そして、何から始めればいいかを知る。"}, {"k": "para", "s": "それが人生健康診断である。"}, {"k": "head", "cls": "sec", "s": "六つの土台を可視化する"}, {"k": "para", "s": "人生健康診断では、人生の六つの土台を確認する。"}, {"k": "para", "s": "お金住まい万が一への備え老後健康災害それぞれについて、「知識」"}, {"k": "para", "s": "「備え」"}, {"k": "para", "s": "「行動」"}, {"k": "para", "s": "の三つの視点から確認する。"}, {"k": "para", "s": "知っているだけでは足りない。"}, {"k": "para", "s": "備えているだけでも足りない。"}, {"k": "para", "s": "実際に行動できているか。"}, {"k": "para", "s": "そこまで見える化する。"}, {"k": "para", "s": "人生最大の敵は「気づいていないこと」"}, {"k": "para", "s": "病気より怖いもの。"}, {"k": "para", "s": "それは、病気に気づいていないことである。"}, {"k": "para", "s": "人生も同じ。"}, {"k": "para", "s": "将来困ることより怖いもの。"}, {"k": "para", "s": "それは、困る可能性に気づいていないことである。"}, {"k": "para", "s": "知らない。"}, {"k": "para", "s": "考えていない。"}, {"k": "para", "s": "後回し。"}, {"k": "para", "s": "これが人生を難しくする。"}, {"k": "para", "s": "人生健康診断は、その「見えないリスク」を見えるようにする。"}, {"k": "head", "cls": "sec", "s": "人生健康診断が変えるもの"}, {"k": "para", "s": "診断を受けた瞬間に、人生が変わるわけではない。"}, {"k": "para", "s": "しかし、人生の見え方は変わる。"}, {"k": "para", "s": "「何となく不安」"}, {"k": "para", "s": "だったものが、具体的な課題になる。"}, {"k": "para", "s": "課題になれば、行動できる。"}, {"k": "para", "s": "行動すれば、未来は変えられる。"}, {"k": "para", "s": "人生健康診断は、人生を変える最初の一歩なのである。"}, {"k": "head", "cls": "sec", "s": "健康診断の次に何をするか"}, {"k": "para", "s": "健康診断を受けたら、医師から説明を受ける。"}, {"k": "para", "s": "生活習慣を見直す。"}, {"k": "para", "s": "必要なら治療を始める。"}, {"k": "para", "s": "人生も同じである。"}, {"k": "para", "s": "診断だけでは意味がない。"}, {"k": "para", "s": "診断の後に、伴走が必要になる。"}, {"k": "para", "s": "だからREALIZE OSでは、人生健康診断の次に、AI伴走が始まる。"}, {"k": "head", "cls": "sec", "s": "AIは人生の主治医ではない"}, {"k": "para", "s": "AIは、人生を決める存在ではない。"}, {"k": "para", "s": "人生を支える存在である。"}, {"k": "para", "s": "診断結果を整理し、性格を理解し、価値観を理解し、生活環境を理解し、一人ひとりに合わせて、最初の一歩を提案する。"}, {"k": "para", "s": "つまり、人生健康診断とAI伴走は、切り離せない。"}, {"k": "head", "cls": "sec", "s": "人生健康診断は文化になる"}, {"k": "para", "s": "昔、健康診断を受ける人は少なかった。"}, {"k": "para", "s": "しかし今では、健康診断は当たり前になった。"}, {"k": "para", "s": "同じように、未来では、高校卒業前に。"}, {"k": "para", "s": "就職前に。"}, {"k": "para", "s": "結婚前に。"}, {"k": "para", "s": "住宅購入前に。"}, {"k": "para", "s": "子どもが生まれる前に。"}, {"k": "para", "s": "定年退職前に。"}, {"k": "para", "s": "人生健康診断を受ける。"}, {"k": "para", "s": "そんな社会が当たり前になるかもしれない。"}, {"k": "para", "s": "私たちは、その文化をつくりたい。"}, {"k": "head", "cls": "sec", "s": "人生健康診断が目指す未来"}, {"k": "para", "s": "人生健康診断の目的は、不安を与えることではない。"}, {"k": "para", "s": "安心を増やすことである。"}, {"k": "para", "s": "足りないところを責めることではない。"}, {"k": "para", "s": "未来を整えることである。"}, {"k": "para", "s": "人を評価するためではない。"}, {"k": "para", "s": "人を守るためである。"}, {"k": "para", "s": "だから、人生健康診断は、人生支援の入口となる。"}, {"k": "head", "cls": "sec", "s": "第五章の結び"}, {"k": "para", "s": "身体の健康を守るために、健康診断がある。"}, {"k": "para", "s": "それなら、人生を守るために、人生健康診断があってもいい。"}, {"k": "para", "s": "人生100年時代では、身体だけではなく、人生そのものを守る視点が必要になる。"}, {"k": "para", "s": "人生健康診断とは、未来を知り、未来を変え、未来を守るための第一歩である。"}, {"k": "para", "s": "そして、その第一歩から、REALIZE OSの人生支援が始まる。"}, {"k": "chap", "no": "第六章", "title": "AI伴走という新しい概念", "sub": "人生には、いつも隣で支える存在が必要だ", "label": "第六章　AI伴走という新しい概念"}, {"k": "head", "cls": "sec", "s": "人は、一人では生きられない"}, {"k": "para", "s": "人は、誰にも相談できずに苦しむことがある。"}, {"k": "para", "s": "仕事で悩む。"}, {"k": "para", "s": "家族との関係で悩む。"}, {"k": "para", "s": "お金で悩む。"}, {"k": "para", "s": "健康で悩む。"}, {"k": "para", "s": "将来が見えなくなる。"}, {"k": "para", "s": "その時、本当に必要なのは何だろうか。"}, {"k": "para", "s": "答えを知っている人だろうか。"}, {"k": "para", "s": "正論を言う人だろうか。"}, {"k": "para", "s": "違う。"}, {"k": "para", "s": "**「自分のことを理解し、一緒に考えてくれる存在」**である。"}, {"k": "head", "cls": "sec", "s": "人生には、セコンドがいない"}, {"k": "para", "s": "ボクシングには、セコンドがいる。"}, {"k": "para", "s": "リングの外から選手を見守り、状況を分析し、励まし、時には厳しく伝え、最後まで支え続ける。"}, {"k": "para", "s": "勝った時だけではない。"}, {"k": "para", "s": "負けた時も。"}, {"k": "para", "s": "スランプの時も。"}, {"k": "para", "s": "怪我をした時も。"}, {"k": "para", "s": "引退後でさえ、人生を支える存在がいる。"}, {"k": "para", "s": "しかし、人生というリングにはどうだろう。"}, {"k": "para", "s": "人生には試合よりも難しい判断が数多くある。"}, {"k": "para", "s": "結婚。"}, {"k": "para", "s": "転職。"}, {"k": "para", "s": "子育て。"}, {"k": "para", "s": "住宅購入。"}, {"k": "para", "s": "親の介護。"}, {"k": "para", "s": "老後。"}, {"k": "para", "s": "それなのに、多くの人には、人生のセコンドがいない。"}, {"k": "para", "s": "だから私たちは考えた。"}, {"k": "para", "s": "人生にも、いつでも相談できるセコンドが必要ではないか。"}, {"k": "head", "cls": "sec", "s": "AI伴走とは何か"}, {"k": "para", "s": "REALIZE OSでは、AI伴走を次のように定義する。"}, {"k": "para", "s": "AI伴走とは、一人ひとりの価値観・性格・人生設計・現在地を理解し、その人が自分らしい判断を積み重ねられるよう継続的に支える仕組みである。"}, {"k": "para", "s": "ここで重要なのは、「答えを与えるAI」ではないということだ。"}, {"k": "para", "s": "AIは人生を代わりに決めない。"}, {"k": "para", "s": "AIは、判断を支える。"}, {"k": "para", "s": "この違いが、REALIZE OSのAI思想である。"}, {"k": "para", "s": "AIは、人を置き換えるために存在するのではないAIが広がるにつれ、「人の仕事がAIに奪われる」という議論が増えた。"}, {"k": "para", "s": "しかし、REALIZE OSは別の未来を見ている。"}, {"k": "para", "s": "AIは、人を減らすための存在ではない。"}, {"k": "para", "s": "人を支える力を増やす存在である。"}, {"k": "para", "s": "先生をなくすためではなく、先生を支える。"}, {"k": "para", "s": "医師をなくすためではなく、医師を支える。"}, {"k": "para", "s": "人生相談員をなくすためではなく、人生相談員を支える。"}, {"k": "para", "s": "家族をなくすためではなく、家族の会話を増やす。"}, {"k": "para", "s": "AIは、人間関係の代わりではない。"}, {"k": "para", "s": "人間関係を豊かにするための存在なのである。"}, {"k": "head", "cls": "sec", "s": "AIは「その人」を理解する"}, {"k": "para", "s": "同じ悩みでも、人によって答えは違う。"}, {"k": "para", "s": "転職した方がいい人もいれば、今の職場で挑戦した方がいい人もいる。"}, {"k": "para", "s": "家を買うべき人もいれば、賃貸を選ぶべき人もいる。"}, {"k": "para", "s": "子どもへの接し方も、人それぞれだ。"}, {"k": "para", "s": "だからAIは、一般論だけでは足りない。"}, {"k": "para", "s": "REALIZE OSのAIは、人生健康診断の結果。"}, {"k": "para", "s": "性格波形診断。"}, {"k": "para", "s": "価値観。"}, {"k": "para", "s": "人生設計。"}, {"k": "para", "s": "相談履歴。"}, {"k": "para", "s": "目標。"}, {"k": "para", "s": "これらを踏まえながら、その人に合った伴走を行う。"}, {"k": "head", "cls": "sec", "s": "AIは、24時間の人生パートナー"}, {"k": "para", "s": "人は、悩みが「営業時間内」に訪れるわけではない。"}, {"k": "para", "s": "夜中に眠れない日もある。"}, {"k": "para", "s": "早朝に不安になる日もある。"}, {"k": "para", "s": "休日に孤独を感じる日もある。"}, {"k": "para", "s": "そのたびに、専門家へ相談できるわけではない。"}, {"k": "para", "s": "だからこそ、AIが最初の相談相手になる。"}, {"k": "para", "s": "困った時、すぐに話せる。"}, {"k": "para", "s": "考えを整理できる。"}, {"k": "para", "s": "必要に応じて専門家へつなぐ。"}, {"k": "para", "s": "AIはゴールではない。"}, {"k": "para", "s": "人と社会をつなぐ入口なのである。"}, {"k": "head", "cls": "sec", "s": "AIは、人を依存させない"}, {"k": "para", "s": "REALIZE OSのAIは、人を依存させることを目的としない。"}, {"k": "para", "s": "毎日使わせることが目的でもない。"}, {"k": "para", "s": "人を囲い込むことでもない。"}, {"k": "para", "s": "目的は、その人が自分で考え、自分で判断できるようになること。"}, {"k": "para", "s": "伴走とは、手を引き続けることではない。"}, {"k": "para", "s": "自分の足で歩けるようになるまで寄り添うことである。"}, {"k": "head", "cls": "sec", "s": "AIは、哲学を未来へつなぐ"}, {"k": "para", "s": "AIには、もう一つの役割がある。"}, {"k": "para", "s": "それは、人の哲学を未来へ残すことである。"}, {"k": "para", "s": "人生経験。"}, {"k": "para", "s": "価値観。"}, {"k": "para", "s": "判断基準。"}, {"k": "para", "s": "言葉。"}, {"k": "para", "s": "生き方。"}, {"k": "para", "s": "尊敬する人が歩んできた人生は、多くの人にとって学びとなる。"}, {"k": "para", "s": "しかし、人は永遠には生きられない。"}, {"k": "para", "s": "だからこそ、AIが哲学を受け継ぐ。"}, {"k": "para", "s": "それは本人の代わりになることではない。"}, {"k": "para", "s": "その人が大切にしてきた「判断軸」を、未来へ届けることである。"}, {"k": "para", "s": "これが、哲学承継モデルの本質である。"}, {"k": "head", "cls": "sec", "s": "AIと人間、それぞれの役割"}, {"k": "para", "s": "AIが得意なこと。"}, {"k": "para", "s": "いつでも相談を受けること。"}, {"k": "para", "s": "情報を整理すること。"}, {"k": "para", "s": "客観的に分析すること。"}, {"k": "para", "s": "継続的に寄り添うこと。"}, {"k": "para", "s": "一方、人間にしかできないこと。"}, {"k": "para", "s": "深く共感すること。"}, {"k": "para", "s": "責任を持って決断すること。"}, {"k": "para", "s": "人生の重みを分かち合うこと。"}, {"k": "para", "s": "REALIZE OSは、AIか人かを選ぶ世界ではない。"}, {"k": "para", "s": "AIと人、それぞれの強みを活かし、一人の人生を支える世界を目指す。"}, {"k": "head", "cls": "sec", "s": "AI伴走が目指す未来"}, {"k": "para", "s": "人生には、誰にも相談できない瞬間がある。"}, {"k": "para", "s": "その孤独を減らしたい。"}, {"k": "para", "s": "人生には、一歩踏み出せない瞬間がある。"}, {"k": "para", "s": "その背中を押したい。"}, {"k": "para", "s": "人生には、判断に迷う瞬間がある。"}, {"k": "para", "s": "その時、一緒に考える存在でありたい。"}, {"k": "para", "s": "AI伴走とは、人を変える技術ではない。"}, {"k": "para", "s": "人が、自分らしく生きる力を引き出すための仕組みである。"}, {"k": "head", "cls": "sec", "s": "第六章の結び"}, {"k": "para", "s": "人生には、正解が一つではない。"}, {"k": "para", "s": "だからこそ、答えを押しつける存在ではなく、一緒に考える存在が必要になる。"}, {"k": "para", "s": "AI伴走とは、技術ではない。"}, {"k": "para", "s": "新しい人間支援のあり方である。"}, {"k": "para", "s": "人生100年時代において、誰もが安心して相談できる存在がいること。"}, {"k": "para", "s": "それが、人の挑戦を支え、家族を守り、未来への希望を育てる。"}, {"k": "para", "s": "REALIZE OSは、その新しい伴走文化を社会に広げていく。"}, {"k": "chap", "no": "第七章", "title": "人生教育", "sub": "人生100年時代に、人生を学ぶ", "label": "第七章　人生教育"}, {"k": "head", "cls": "sec", "s": "人は、人生の勉強をしていない"}, {"k": "para", "s": "私たちは学校で、多くのことを学ぶ。"}, {"k": "para", "s": "国語。"}, {"k": "para", "s": "数学。"}, {"k": "para", "s": "英語。"}, {"k": "para", "s": "理科。"}, {"k": "para", "s": "社会。"}, {"k": "para", "s": "歴史。"}, {"k": "para", "s": "体育。"}, {"k": "para", "s": "音楽。"}, {"k": "para", "s": "どれも大切な学びである。"}, {"k": "para", "s": "しかし、学校を卒業して社会に出た瞬間、多くの人が直面するのは、教科書には載っていなかった問題である。"}, {"k": "para", "s": "お金をどう管理するか。"}, {"k": "para", "s": "住まいをどう選ぶか。"}, {"k": "para", "s": "保険は本当に必要なのか。"}, {"k": "para", "s": "結婚とは何か。"}, {"k": "para", "s": "子育てで大切なことは何か。"}, {"k": "para", "s": "親の介護をどう考えるか。"}, {"k": "para", "s": "老後にどう備えるか。"}, {"k": "para", "s": "心の健康をどう守るか。"}, {"k": "para", "s": "人生には、「生き方」を左右する問いが数多くある。"}, {"k": "para", "s": "それにもかかわらず、その答えを体系的に学ぶ機会は、ほとんど存在していない。"}, {"k": "head", "cls": "sec", "s": "人生は、経験だけで学ぶには長すぎる"}, {"k": "para", "s": "「経験すれば分かる。」"}, {"k": "para", "s": "確かに、それも一つの真実である。"}, {"k": "para", "s": "しかし、人生100年時代において、それだけでは遅いこともある。"}, {"k": "para", "s": "住宅購入は、何度も経験するものではない。"}, {"k": "para", "s": "子育ても、やり直しはできない。"}, {"k": "para", "s": "老後の準備も、気づいたときには時間を取り戻せない。"}, {"k": "para", "s": "人生には、一度きりの判断が数多くある。"}, {"k": "para", "s": "だからこそ、経験だけに頼るのではなく、先人たちの知恵や原理原則から学ぶことが大切になる。"}, {"k": "para", "s": "人生教育とは、「失敗しないための教育」ではない。"}, {"k": "para", "s": "より良い判断をするための教育である。"}, {"k": "head", "cls": "sec", "s": "人生教育とは何か"}, {"k": "para", "s": "REALIZE OSでは、人生教育を次のように定義する。"}, {"k": "para", "s": "人生教育とは、人生100年時代を自分らしく生き抜くために必要な判断軸と原理原則を学び、日々の意思決定に活かすための基礎教育である。"}, {"k": "para", "s": "ここで重要なのは、「知識を増やすこと」が目的ではないということだ。"}, {"k": "para", "s": "目的は、知識を使って、自分の人生で判断できるようになることである。"}, {"k": "head", "cls": "sec", "s": "知識よりも、判断軸を育てる"}, {"k": "para", "s": "現代は、知識が不足している時代ではない。"}, {"k": "para", "s": "インターネットを開けば、情報は無限にある。"}, {"k": "para", "s": "動画もある。"}, {"k": "para", "s": "SNSもある。"}, {"k": "para", "s": "AIに質問すれば、答えも返ってくる。"}, {"k": "para", "s": "それでも、多くの人が迷っている。"}, {"k": "para", "s": "なぜか。"}, {"k": "para", "s": "知識が足りないからではない。"}, {"k": "para", "s": "「何を基準に選ぶか」が分からないからである。"}, {"k": "para", "s": "情報は選択肢を増やす。"}, {"k": "para", "s": "判断軸は、選択を支える。"}, {"k": "para", "s": "人生教育が育てるのは、知識ではなく判断軸なのである。"}, {"k": "head", "cls": "sec", "s": "人生教育は「答え」を教えない"}, {"k": "para", "s": "REALIZE OSの人生教育は、「これが正解です」と教える教育ではない。"}, {"k": "para", "s": "人生に、すべての人に当てはまる唯一の正解はない。"}, {"k": "para", "s": "ある人には持ち家が合っていても、別の人には賃貸が合う。"}, {"k": "para", "s": "ある人には独立が向いていても、別の人には組織で力を発揮する道がある。"}, {"k": "para", "s": "だから人生教育は、答えを押しつけない。"}, {"k": "para", "s": "原理原則を学び、自分の価値観や状況に合わせて考えられる力を育てる。"}, {"k": "para", "s": "それが、本当の意味での教育である。"}, {"k": "head", "cls": "sec", "s": "人生教育の土台となるもの"}, {"k": "para", "s": "REALIZE OSでは、人生教育の中心に「人生の六つの土台」を置いている。"}, {"k": "para", "s": "お金。"}, {"k": "para", "s": "住まい。"}, {"k": "para", "s": "万が一への備え。"}, {"k": "para", "s": "老後。"}, {"k": "para", "s": "健康。"}, {"k": "para", "s": "災害。"}, {"k": "para", "s": "これらは人生の基礎である。"}, {"k": "para", "s": "その上に、仕事、人間関係、子育て、挑戦、夢、社会貢献といった人生が築かれていく。"}, {"k": "para", "s": "基礎が整えば、人は安心して挑戦できる。"}, {"k": "para", "s": "だから、人生教育は夢を語る前に、人生の土台を整えることから始まる。"}, {"k": "head", "cls": "sec", "s": "人生教育は「行動」のためにある"}, {"k": "para", "s": "学ぶこと自体が目的ではない。"}, {"k": "para", "s": "学んだことを行動につなげることが目的である。"}, {"k": "para", "s": "家計を見直す。"}, {"k": "para", "s": "家族と将来について話し合う。"}, {"k": "para", "s": "備蓄を始める。"}, {"k": "para", "s": "健康診断を受ける。"}, {"k": "para", "s": "人生設計を考える。"}, {"k": "para", "s": "小さな一歩でも構わない。"}, {"k": "para", "s": "行動が変われば、未来が変わる。"}, {"k": "para", "s": "人生教育は、その一歩を支えるためにある。"}, {"k": "head", "cls": "sec", "s": "AIと人生教育"}, {"k": "para", "s": "AIは、人生教育を置き換えるものではない。"}, {"k": "para", "s": "AIは、一人ひとりに合った学び方を支える存在である。"}, {"k": "para", "s": "同じ教材でも、人によって理解しやすい説明は違う。"}, {"k": "para", "s": "同じ課題でも、必要なアドバイスは違う。"}, {"k": "para", "s": "AIは、その人の理解度や価値観、人生健康診断の結果を踏まえ、最適な学びを提案する。"}, {"k": "para", "s": "つまり、人生教育は一斉授業から、一人ひとりに合わせた伴走型の学びへ進化するのである。"}, {"k": "head", "cls": "sec", "s": "人生教育が文化になる未来"}, {"k": "para", "s": "私たちは、学校教育を否定したいわけではない。"}, {"k": "para", "s": "企業研修を否定したいわけでもない。"}, {"k": "para", "s": "その上で、新たに「人生教育」という文化を加えたい。"}, {"k": "para", "s": "高校を卒業するときに、人生の基礎を学ぶ。"}, {"k": "para", "s": "結婚するときに、夫婦で人生設計を学ぶ。"}, {"k": "para", "s": "住宅を購入するときに、住まいと家計を学ぶ。"}, {"k": "para", "s": "定年を迎える前に、老後の設計を学ぶ。"}, {"k": "para", "s": "人生の節目ごとに、人生教育を受けることが当たり前になる。"}, {"k": "para", "s": "そんな社会を目指している。"}, {"k": "head", "cls": "sec", "s": "人生教育が目指すもの"}, {"k": "para", "s": "人生教育の目的は、人を成功させることではない。"}, {"k": "para", "s": "自分らしく、納得のいく人生を歩めるようにすることだ。"}, {"k": "para", "s": "人生の終わりに、「あの時の判断で良かった。」"}, {"k": "para", "s": "そう思える人生を支えること。"}, {"k": "para", "s": "それが、人生教育の使命である。"}, {"k": "head", "cls": "sec", "s": "第七章の結び"}, {"k": "para", "s": "教育とは、知識を教えることではない。"}, {"k": "para", "s": "未来を生きる力を育てることである。"}, {"k": "para", "s": "人生100年時代に必要なのは、職業教育だけではない。"}, {"k": "para", "s": "人生そのものを学ぶ教育である。"}, {"k": "para", "s": "REALIZE OSは、一人ひとりが自分らしい判断軸を持ち、自信を持って人生を歩める社会を目指している。"}, {"k": "para", "s": "その第一歩が、人生教育なのである。"}, {"k": "chap", "no": "第八章", "title": "人生設計", "sub": "未来は、偶然ではなく設計できる", "label": "第八章　人生設計"}, {"k": "head", "cls": "sec", "s": "人生は「流されるもの」ではない"}, {"k": "para", "s": "多くの人は、人生を流れに任せて生きている。"}, {"k": "para", "s": "学校を卒業する。"}, {"k": "para", "s": "就職する。"}, {"k": "para", "s": "働く。"}, {"k": "para", "s": "結婚する。"}, {"k": "para", "s": "子どもが生まれる。"}, {"k": "para", "s": "家を買う。"}, {"k": "para", "s": "老後を迎える。"}, {"k": "para", "s": "もちろん、その生き方が悪いわけではない。"}, {"k": "para", "s": "しかし、気づけば目の前の出来事に追われ、一年が過ぎ、十年が過ぎ、人生が過ぎていく。"}, {"k": "para", "s": "そしてある日、「もっと早く考えておけばよかった。」"}, {"k": "para", "s": "そう後悔する人は少なくない。"}, {"k": "para", "s": "人生は、流されているようでいて、実は日々の小さな判断の積み重ねで形づくられている。"}, {"k": "para", "s": "だからこそ、人生には設計が必要なのである。"}, {"k": "head", "cls": "sec", "s": "建物には設計図がある"}, {"k": "para", "s": "家を建てる前には、設計図を描く。"}, {"k": "para", "s": "完成した姿をイメージし、必要な部屋を考え、強度や使いやすさまで計画する。"}, {"k": "para", "s": "会社をつくるなら事業計画を立てる。"}, {"k": "para", "s": "旅行に行くなら旅程を考える。"}, {"k": "para", "s": "結婚式にも進行表がある。"}, {"k": "para", "s": "私たちは、人生以外のことには設計図を描く。"}, {"k": "para", "s": "それなのに、一番長く、一番大切な「人生」には、設計図を描かないことが多い。"}, {"k": "para", "s": "それは不思議なことである。"}, {"k": "para", "s": "人生は、一番設計が必要なプロジェクトではないだろうか。"}, {"k": "head", "cls": "sec", "s": "人生設計とは何か"}, {"k": "para", "s": "REALIZE OSでは、人生設計を次のように定義する。"}, {"k": "para", "s": "人生設計とは、自分がどのような人生を歩みたいのかを明確にし、その実現に必要な判断と行動を、人生100年という時間軸で計画することである。"}, {"k": "para", "s": "ここで重要なのは、「予定を決めること」ではない。"}, {"k": "para", "s": "未来を固定することでもない。"}, {"k": "para", "s": "人生設計とは、自分の人生を主体的に選び続けるための羅針盤を持つことである。"}, {"k": "head", "cls": "sec", "s": "夢と設計は違う"}, {"k": "para", "s": "夢は、大切である。"}, {"k": "para", "s": "夢は、人を前向きにし、挑戦する勇気を与えてくれる。"}, {"k": "para", "s": "しかし、夢だけでは人生は前に進まない。"}, {"k": "para", "s": "たとえば、「いつか家を建てたい」という夢があっても、家計の準備や住まいの知識がなければ実現は難しい。"}, {"k": "para", "s": "「家族を幸せにしたい」と願っていても、仕事と家庭の時間をどうつくるかを考えなければ、その願いは形になりにくい。"}, {"k": "para", "s": "夢は目的地である。"}, {"k": "para", "s": "設計は、そこへたどり着くための地図である。"}, {"k": "para", "s": "REALIZE OSは、夢を否定しない。"}, {"k": "para", "s": "むしろ、夢を実現するために人生設計が必要だと考える。"}, {"k": "head", "cls": "sec", "s": "人生設計は「逆算」から始まる"}, {"k": "para", "s": "人生設計では、まずゴールを考える。"}, {"k": "para", "s": "どんな人生を送りたいか。"}, {"k": "para", "s": "どんな家族でありたいか。"}, {"k": "para", "s": "どんな最期を迎えたいか。"}, {"k": "para", "s": "人生の終わりから逆算すると、今やるべきことが見えてくる。"}, {"k": "para", "s": "老後の暮らしを考えれば、今の家計を見直す理由が分かる。"}, {"k": "para", "s": "子どもの未来を考えれば、今日の時間の使い方が変わる。"}, {"k": "para", "s": "十年後の自分を思い描けば、今日の選択が変わる。"}, {"k": "para", "s": "未来を描くことは、今日を変えることなのである。"}, {"k": "para", "s": "人生設計は「変えていい」"}, {"k": "para", "s": "人生設計というと、一度決めたら変えてはいけないものだと思われることがある。"}, {"k": "para", "s": "しかし、人生は予測できない。"}, {"k": "para", "s": "新しい出会いもある。"}, {"k": "para", "s": "予想外の出来事も起こる。"}, {"k": "para", "s": "価値観も変わる。"}, {"k": "para", "s": "だから、人生設計は何度でも見直していい。"}, {"k": "para", "s": "むしろ、見直すことを前提につくるべきである。"}, {"k": "para", "s": "人生設計とは、未来を縛るものではない。"}, {"k": "para", "s": "未来に合わせて成長するための設計図なのである。"}, {"k": "head", "cls": "sec", "s": "人生設計とAI伴走"}, {"k": "para", "s": "一人で人生設計を考えることは簡単ではない。"}, {"k": "para", "s": "だから、REALIZE OSではAI伴走が寄り添う。"}, {"k": "para", "s": "人生健康診断の結果をもとに、現在地を確認する。"}, {"k": "para", "s": "性格波形診断から、自分らしい強みや傾向を理解する。"}, {"k": "para", "s": "人生教育で判断軸を学ぶ。"}, {"k": "para", "s": "そしてAIが、その人の価値観や状況に合わせて、一緒に人生設計を考える。"}, {"k": "para", "s": "AIは未来を決めるのではない。"}, {"k": "para", "s": "未来を考える相棒なのである。"}, {"k": "head", "cls": "sec", "s": "人生設計は「家族設計」でもある"}, {"k": "para", "s": "人生は、自分一人だけのものではない。"}, {"k": "para", "s": "家族がいる。"}, {"k": "para", "s": "友人がいる。"}, {"k": "para", "s": "仲間がいる。"}, {"k": "para", "s": "だから人生設計は、自分だけの設計では終わらない。"}, {"k": "para", "s": "夫婦で話し合う。"}, {"k": "para", "s": "親子で考える。"}, {"k": "para", "s": "家族みんなで未来を描く。"}, {"k": "para", "s": "その時間こそが、家族の絆を深める。"}, {"k": "para", "s": "人生設計とは、人生を設計するだけではない。"}, {"k": "para", "s": "家族の未来を共有する時間でもある。"}, {"k": "head", "cls": "sec", "s": "人生設計の目的"}, {"k": "para", "s": "人生設計の目的は、成功することではない。"}, {"k": "para", "s": "他人と比べて勝つことでもない。"}, {"k": "para", "s": "自分が納得できる人生を歩むこと。"}, {"k": "para", "s": "人生の終わりに、「自分らしく生きた。」"}, {"k": "para", "s": "「家族と笑い合えた。」"}, {"k": "para", "s": "「あの判断で良かった。」"}, {"k": "para", "s": "そう思える人生をつくることである。"}, {"k": "head", "cls": "sec", "s": "第八章の結び"}, {"k": "para", "s": "人生は、偶然の連続ではない。"}, {"k": "para", "s": "日々の判断が積み重なり、未来が形づくられる。"}, {"k": "para", "s": "だからこそ、人生には設計が必要である。"}, {"k": "para", "s": "設計とは、未来を縛ることではない。"}, {"k": "para", "s": "未来を自由に選び続けるための土台である。"}, {"k": "para", "s": "REALIZE OSは、一人ひとりが自分らしい人生を描き、その実現に向けて歩み続けられる社会を目指している。"}, {"k": "para", "s": "人生設計とは、その第一歩なのである。"}, {"k": "chap", "no": "第九章", "title": "人生相談", "sub": "人生には、人にしかできない支援がある", "label": "第九章　人生相談"}, {"k": "head", "cls": "sec", "s": "人は、人生を一人では生きられない"}, {"k": "para", "s": "人生には、自分一人では答えを出せない瞬間がある。"}, {"k": "para", "s": "進学。"}, {"k": "para", "s": "就職。"}, {"k": "para", "s": "転職。"}, {"k": "para", "s": "結婚。"}, {"k": "para", "s": "出産。"}, {"k": "para", "s": "住宅購入。"}, {"k": "para", "s": "子育て。"}, {"k": "para", "s": "介護。"}, {"k": "para", "s": "病気。"}, {"k": "para", "s": "老後。"}, {"k": "para", "s": "人生には、大きな節目が何度も訪れる。"}, {"k": "para", "s": "そのたびに、人は迷う。"}, {"k": "para", "s": "正解が分からないからではない。"}, {"k": "para", "s": "「この選択で本当にいいのだろうか。」"}, {"k": "para", "s": "その不安があるからである。"}, {"k": "para", "s": "だから人は、相談する。"}, {"k": "para", "s": "相談とは、弱さではない。"}, {"k": "para", "s": "より良い判断をするための行動である。"}, {"k": "head", "cls": "sec", "s": "なぜ、多くの人は相談できないのか"}, {"k": "para", "s": "本当は相談したい。"}, {"k": "para", "s": "しかし、多くの人は相談しない。"}, {"k": "para", "s": "なぜか。"}, {"k": "para", "s": "相談する相手が分からない。"}, {"k": "para", "s": "迷惑をかけたくない。"}, {"k": "para", "s": "否定されたくない。"}, {"k": "para", "s": "営業されるのではないかと警戒する。"}, {"k": "para", "s": "相談したところで解決しないと思っている。"}, {"k": "para", "s": "つまり、多くの人は、相談したくないのではない。"}, {"k": "para", "s": "安心して相談できる場所がないのである。"}, {"k": "head", "cls": "sec", "s": "人生相談とは何か"}, {"k": "para", "s": "REALIZE OSでは、人生相談を次のように定義する。"}, {"k": "para", "s": "人生相談とは、一人ひとりの人生を尊重し、その人らしい判断と行動を支えるために、専門家と伴走者が共に考え、未来への選択を支援することである。"}, {"k": "para", "s": "ここで重要なのは、「答えを教えること」ではない。"}, {"k": "para", "s": "相談とは、答えを押しつける場ではない。"}, {"k": "para", "s": "相談とは、その人自身が納得できる判断にたどり着くための対話である。"}, {"k": "head", "cls": "sec", "s": "AIと人、それぞれの役割"}, {"k": "para", "s": "AIは、24時間寄り添うことができる。"}, {"k": "para", "s": "相談内容を整理できる。"}, {"k": "para", "s": "過去の相談履歴を踏まえて提案できる。"}, {"k": "para", "s": "人生健康診断や人生設計とも連携できる。"}, {"k": "para", "s": "しかし、人にしかできないこともある。"}, {"k": "para", "s": "相手の表情を読み取る。"}, {"k": "para", "s": "沈黙の意味を感じる。"}, {"k": "para", "s": "人生経験をもとに寄り添う。"}, {"k": "para", "s": "責任を持って背中を押す。"}, {"k": "para", "s": "REALIZE OSは、AIと人を競わせない。"}, {"k": "para", "s": "AIは日常の伴走者。"}, {"k": "para", "s": "人は人生の節目を支える伴走者。"}, {"k": "para", "s": "この役割分担が、人生支援をより豊かなものにする。"}, {"k": "head", "cls": "sec", "s": "人生相談は「売る場」ではない"}, {"k": "para", "s": "REALIZE OSにおける人生相談は、商品を販売するための場ではない。"}, {"k": "para", "s": "まず、その人の人生を理解する。"}, {"k": "para", "s": "何に困っているのか。"}, {"k": "para", "s": "何を大切にしているのか。"}, {"k": "para", "s": "どんな未来を望んでいるのか。"}, {"k": "para", "s": "それを理解した上で、本当に必要な支援を一緒に考える。"}, {"k": "para", "s": "もし住まいが課題なら、住まいの専門家へ。"}, {"k": "para", "s": "保険なら保険の専門家へ。"}, {"k": "para", "s": "法律なら専門家へ。"}, {"k": "para", "s": "健康なら医療機関へ。"}, {"k": "para", "s": "人生相談は、「売る」ことが目的ではない。"}, {"k": "para", "s": "「つなぐ」ことが目的である。"}, {"k": "head", "cls": "sec", "s": "人生相談員という新しい存在"}, {"k": "para", "s": "人生100年時代には、新しい専門職が必要になる。"}, {"k": "para", "s": "それが「人生相談員」である。"}, {"k": "para", "s": "人生相談員は、すべての専門知識を持つ人ではない。"}, {"k": "para", "s": "すべてを一人で解決する人でもない。"}, {"k": "para", "s": "人生全体を俯瞰し、その人の現在地を理解し、必要な専門家や支援につなぐコーディネーターである。"}, {"k": "para", "s": "病院で言えば総合診療医のような役割。"}, {"k": "para", "s": "地域で言えば、人生の総合窓口。"}, {"k": "para", "s": "それが人生相談員である。"}, {"k": "head", "cls": "sec", "s": "地域に人生相談窓口をつくる"}, {"k": "para", "s": "私たちが目指しているのは、困った人だけが訪れる場所ではない。"}, {"k": "para", "s": "人生の節目で、誰もが自然に立ち寄れる場所。"}, {"k": "para", "s": "住宅を考えるとき。"}, {"k": "para", "s": "子どもが生まれたとき。"}, {"k": "para", "s": "親の介護が始まったとき。"}, {"k": "para", "s": "定年を迎えるとき。"}, {"k": "para", "s": "「まず相談してみよう。」"}, {"k": "para", "s": "そう思える地域の窓口を増やしたい。"}, {"k": "para", "s": "これが、LMPが担う役割である。"}, {"k": "para", "s": "LMPは不動産会社ではない。"}, {"k": "para", "s": "地域の人生相談窓口なのである。"}, {"k": "para", "s": "企業にも人生相談窓口を人生の悩みは、家庭だけで起こるものではない。"}, {"k": "para", "s": "職場にもある。"}, {"k": "para", "s": "仕事の悩み。"}, {"k": "para", "s": "人間関係。"}, {"k": "para", "s": "家計の不安。"}, {"k": "para", "s": "将来への不安。"}, {"k": "para", "s": "こうした悩みは、仕事のパフォーマンスにも影響する。"}, {"k": "para", "s": "だから企業にも、人生相談窓口が必要になる。"}, {"k": "para", "s": "これがREALIZE CLUBの役割である。"}, {"k": "para", "s": "社員が安心して相談できる環境は、社員を守るだけでなく、企業の未来も守る。"}, {"k": "head", "cls": "sec", "s": "人生相談は「自立」を目指す"}, {"k": "para", "s": "人生相談のゴールは、相談し続けてもらうことではない。"}, {"k": "para", "s": "その人が、自分の判断に自信を持てるようになること。"}, {"k": "para", "s": "必要な時には相談し、普段は自分で考え、自分で歩けるようになること。"}, {"k": "para", "s": "相談とは、依存を生むものではない。"}, {"k": "para", "s": "自立を育てるものである。"}, {"k": "head", "cls": "sec", "s": "第九章の結び"}, {"k": "para", "s": "人生には、一人で乗り越えられることもある。"}, {"k": "para", "s": "しかし、一人では難しいこともある。"}, {"k": "para", "s": "だからこそ、相談できる人がいる。"}, {"k": "para", "s": "AIが寄り添い、人が支え、専門家が力を貸す。"}, {"k": "para", "s": "そのすべてがつながることで、一人ひとりは安心して人生を歩むことができる。"}, {"k": "para", "s": "人生相談とは、問題を解決する場ではない。"}, {"k": "para", "s": "人生を前へ進めるための対話の場なのである。"}, {"k": "para", "s": "REALIZE OSは、その対話を社会に広げていく。"}, {"k": "chap", "no": "第十章", "title": "REALIZE OS", "sub": "人生100年時代を支える人生OS", "label": "第十章　REALIZE OS"}, {"k": "head", "cls": "sec", "s": "OSとは何か"}, {"k": "para", "s": "私たちは毎日、スマートフォンやパソコンを使っている。"}, {"k": "para", "s": "アプリは便利である。"}, {"k": "para", "s": "しかし、本当に重要なのはアプリではない。"}, {"k": "para", "s": "OSである。"}, {"k": "para", "s": "OSとは、すべてを動かす土台である。"}, {"k": "para", "s": "OSがあるから、アプリは動く。"}, {"k": "para", "s": "OSがあるから、新しい機能を追加できる。"}, {"k": "para", "s": "OSがあるから、アップデートできる。"}, {"k": "para", "s": "つまり、OSとは「成長し続けるための基盤」である。"}, {"k": "head", "cls": "sec", "s": "人生にもOSがある"}, {"k": "para", "s": "人は、生まれた瞬間から、様々な価値観の中で育つ。"}, {"k": "para", "s": "親から学ぶ。"}, {"k": "para", "s": "学校で学ぶ。"}, {"k": "para", "s": "友達から学ぶ。"}, {"k": "para", "s": "社会から学ぶ。"}, {"k": "para", "s": "その積み重ねが、その人の考え方判断基準行動パターン価値観になる。"}, {"k": "para", "s": "私たちは、これを人生OSと呼ぶ。"}, {"k": "head", "cls": "sec", "s": "人生OSは知らないうちに作られる"}, {"k": "para", "s": "ほとんどの人は、人生OSを自分で作っている意識がない。"}, {"k": "para", "s": "親の価値観。"}, {"k": "para", "s": "学校教育。"}, {"k": "para", "s": "時代背景。"}, {"k": "para", "s": "地域文化。"}, {"k": "para", "s": "会社。"}, {"k": "para", "s": "テレビ。"}, {"k": "para", "s": "SNS。"}, {"k": "para", "s": "様々なものから、少しずつ人生OSは作られていく。"}, {"k": "para", "s": "つまり、今の自分は、これまでインストールされてきた人生OSによって判断しているのである。"}, {"k": "head", "cls": "sec", "s": "昭和のOSで令和を生きている"}, {"k": "para", "s": "ここで、人生100年時代最大の問題がある。"}, {"k": "para", "s": "社会は変わった。"}, {"k": "para", "s": "AIが生まれた。"}, {"k": "para", "s": "インターネットが生まれた。"}, {"k": "para", "s": "人生100年になった。"}, {"k": "para", "s": "しかし、多くの人は、人生80年時代につくられた人生OSのまま生きている。"}, {"k": "para", "s": "昔は正しかった判断が、今では最適とは限らない。"}, {"k": "para", "s": "だから、人生が苦しくなる。"}, {"k": "head", "cls": "sec", "s": "必要なのはOSのアップデート"}, {"k": "para", "s": "スマートフォンも、OSを更新しなければ、動作が重くなる。"}, {"k": "para", "s": "新しいアプリも使えない。"}, {"k": "para", "s": "セキュリティも弱くなる。"}, {"k": "para", "s": "人生も同じである。"}, {"k": "para", "s": "人生100年時代には、人生100年時代に合った判断軸が必要になる。"}, {"k": "para", "s": "つまり、人生OSをアップデートする必要がある。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSとは何か"}, {"k": "para", "s": "REALIZE OSでは、次のように定義する。"}, {"k": "para", "s": "REALIZE OSとは、一人ひとりが人生100年時代を安心して生き抜くために、判断軸をアップデートし続ける人生支援OSである。"}, {"k": "para", "s": "ここでいうOSとは、アプリではない。"}, {"k": "para", "s": "サービスでもない。"}, {"k": "para", "s": "会社でもない。"}, {"k": "para", "s": "人生を支える基盤である。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSを構成するもの"}, {"k": "para", "s": "REALIZE OSは、一つの商品ではない。"}, {"k": "para", "s": "人生健康診断がある。"}, {"k": "para", "s": "AI伴走がある。"}, {"k": "para", "s": "人生教育がある。"}, {"k": "para", "s": "人生設計がある。"}, {"k": "para", "s": "人生相談がある。"}, {"k": "para", "s": "専門家ネットワークがある。"}, {"k": "para", "s": "地域窓口がある。"}, {"k": "para", "s": "企業導入がある。"}, {"k": "para", "s": "哲学承継がある。"}, {"k": "para", "s": "これらすべてが連携して、初めてREALIZE OSになる。"}, {"k": "head", "cls": "sec", "s": "人生はアップデートし続ける"}, {"k": "para", "s": "REALIZE OSには、終わりがない。"}, {"k": "para", "s": "二十歳。"}, {"k": "para", "s": "三十歳。"}, {"k": "para", "s": "四十歳。"}, {"k": "para", "s": "五十歳。"}, {"k": "para", "s": "六十歳。"}, {"k": "para", "s": "七十歳。"}, {"k": "para", "s": "人生は変化し続ける。"}, {"k": "para", "s": "家族も変わる。"}, {"k": "para", "s": "仕事も変わる。"}, {"k": "para", "s": "価値観も変わる。"}, {"k": "para", "s": "だから、人生OSも、アップデートし続ける。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSは循環する"}, {"k": "para", "s": "REALIZE OSは、一直線ではない。"}, {"k": "para", "s": "人生健康診断。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "AI伴走。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "人生教育。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "人生設計。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "人生相談。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "実行。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "再診断。"}, {"k": "para", "s": "↓"}, {"k": "para", "s": "またAI伴走へ。"}, {"k": "para", "s": "人生は、この循環を何度も繰り返す。"}, {"k": "para", "s": "その積み重ねが、人生の質を高めていく。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSは人生を管理しない"}, {"k": "para", "s": "ここで、大切なことがある。"}, {"k": "para", "s": "REALIZE OSは、人生を管理するOSではない。"}, {"k": "para", "s": "人生を支配するOSでもない。"}, {"k": "para", "s": "人に命令するOSでもない。"}, {"k": "para", "s": "人生を評価するOSでもない。"}, {"k": "para", "s": "REALIZE OSは、人生の主人公を、本人のままにするOSである。"}, {"k": "para", "s": "私たちは、人生を決めない。"}, {"k": "para", "s": "人生を支える。"}, {"k": "para", "s": "これがREALIZE OSの哲学である。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSが目指す未来"}, {"k": "para", "s": "私たちは、AIを普及させたいわけではない。"}, {"k": "para", "s": "教育を売りたいわけでもない。"}, {"k": "para", "s": "診断を広めたいわけでもない。"}, {"k": "para", "s": "人生設計書を作りたいだけでもない。"}, {"k": "para", "s": "目指しているのは、一人ひとりが、自分らしい人生を、自分で選び、自分で歩ける社会である。"}, {"k": "para", "s": "そのために、人生OSを整え、アップデートし続ける文化をつくる。"}, {"k": "para", "s": "それが、REALIZE OSである。"}, {"k": "head", "cls": "sec", "s": "第十章の結び"}, {"k": "para", "s": "人生100年時代には、人生100年時代のOSが必要になる。"}, {"k": "para", "s": "それは、知識だけではない。"}, {"k": "para", "s": "AIだけでもない。"}, {"k": "para", "s": "教育だけでもない。"}, {"k": "para", "s": "人生を支える、すべての仕組みが連携する基盤である。"}, {"k": "para", "s": "REALIZE OSとは、人生をアップデートし続けるための人生支援OS。"}, {"k": "para", "s": "そして、誰もが安心して挑戦できる未来を支える、新しい社会インフラなのである。"}, {"k": "chap", "no": "第十一章", "title": "人生支援を社会へ届ける", "sub": "REALIZE OSの提供モデル", "label": "第十一章　人生支援を社会へ届ける"}, {"k": "head", "cls": "sec", "s": "思想だけでは、社会は変わらない"}, {"k": "para", "s": "どれほど素晴らしい理念があっても、どれほど優れた教育があっても、人々へ届かなければ、社会は変わらない。"}, {"k": "para", "s": "人生支援も同じである。"}, {"k": "para", "s": "人生支援は、本の中だけにあってはいけない。"}, {"k": "para", "s": "講演会だけで終わってはいけない。"}, {"k": "para", "s": "一部の人だけが受けられるものでもいけない。"}, {"k": "para", "s": "誰もが、必要な時に、必要な形で受けられること。"}, {"k": "para", "s": "それが、本当の社会インフラである。"}, {"k": "head", "cls": "sec", "s": "一つのサービスでは、社会は変えられない"}, {"k": "para", "s": "人生100年時代には、学生もいる。"}, {"k": "para", "s": "社会人もいる。"}, {"k": "para", "s": "子育て世代もいる。"}, {"k": "para", "s": "経営者もいる。"}, {"k": "para", "s": "高齢者もいる。"}, {"k": "para", "s": "地域もある。"}, {"k": "para", "s": "企業もある。"}, {"k": "para", "s": "一つのサービスだけで、すべての人へ届けることはできない。"}, {"k": "para", "s": "だからREALIZE OSでは、届け方そのものを設計した。"}, {"k": "head", "cls": "sec", "s": "REALIZE OS提供モデル"}, {"k": "para", "s": "私たちは、人生支援を届ける方法を、四つのモデルに整理した。"}, {"k": "para", "s": "それぞれ役割は違う。"}, {"k": "para", "s": "しかし、目的は一つである。"}, {"k": "para", "s": "人生支援を、一人でも多くの人へ届けること。"}, {"k": "para", "s": "第一の提供モデルREALIZE CLUB Personal個人へ届ける人生支援は、一人ひとりから始まる。"}, {"k": "para", "s": "人生健康診断。"}, {"k": "para", "s": "AI伴走。"}, {"k": "para", "s": "人生教育。"}, {"k": "para", "s": "人生設計。"}, {"k": "para", "s": "人生相談。"}, {"k": "para", "s": "これらを、いつでも受けられる環境を提供する。"}, {"k": "para", "s": "スマートフォン一つで、人生の伴走者がいる。"}, {"k": "para", "s": "それが、REALIZE CLUB Personalである。"}, {"k": "para", "s": "第二の提供モデルREALIZE CLUB企業へ届ける人生の多くは、仕事と共にある。"}, {"k": "para", "s": "社員が安心して働けることは、企業の成長にもつながる。"}, {"k": "para", "s": "人生支援は、福利厚生では終わらない。"}, {"k": "para", "s": "人的資本経営でも終わらない。"}, {"k": "para", "s": "社員の人生そのものを支える文化へ。"}, {"k": "para", "s": "REALIZE CLUBは、企業の中に人生支援を届ける仕組みである。"}, {"k": "para", "s": "第三の提供モデルLMP地域へ届ける人生には、リアルな相談相手が必要になる瞬間がある。"}, {"k": "para", "s": "住宅。"}, {"k": "para", "s": "保険。"}, {"k": "para", "s": "資産形成。"}, {"k": "para", "s": "介護。"}, {"k": "para", "s": "相続。"}, {"k": "para", "s": "地域には、専門家がいる。"}, {"k": "para", "s": "しかし、「誰に相談すればいいか分からない。」"}, {"k": "para", "s": "という人が多い。"}, {"k": "para", "s": "LMPは、地域に人生相談窓口をつくる。"}, {"k": "para", "s": "専門家を紹介する場所ではない。"}, {"k": "para", "s": "人生全体を見渡し、必要な支援へつなぐ、地域の人生支援拠点である。"}, {"k": "para", "s": "第四の提供モデル哲学承継モデル想いから届ける人は、好きな人の言葉だから、心が動くことがある。"}, {"k": "para", "s": "尊敬する人だから、学びたくなることがある。"}, {"k": "para", "s": "人生教育を、押し付ける時代ではない。"}, {"k": "para", "s": "共感から始まる時代である。"}, {"k": "para", "s": "スポーツ。"}, {"k": "para", "s": "音楽。"}, {"k": "para", "s": "経営。"}, {"k": "para", "s": "芸術。"}, {"k": "para", "s": "文化。"}, {"k": "para", "s": "様々な分野で人生を歩んできた人の哲学を、AIと教育を通じて未来へ承継する。"}, {"k": "para", "s": "これが、哲学承継モデルである。"}, {"k": "head", "cls": "sec", "s": "四つは競合しない"}, {"k": "para", "s": "REALIZE CLUB Personalは、個人へ届ける。"}, {"k": "para", "s": "REALIZE CLUBは、企業へ届ける。"}, {"k": "para", "s": "LMPは、地域へ届ける。"}, {"k": "para", "s": "哲学承継モデルは、影響力を通じて届ける。"}, {"k": "para", "s": "入口は違う。"}, {"k": "para", "s": "しかし、中で動いているものは、すべて同じ。"}, {"k": "para", "s": "REALIZE OSである。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSは見えない"}, {"k": "para", "s": "スマートフォンを使う人は、毎日OSを使っている。"}, {"k": "para", "s": "しかし、OSを意識している人は少ない。"}, {"k": "para", "s": "REALIZE OSも同じである。"}, {"k": "para", "s": "利用者は、PHENIX CLUBを使うかもしれない。"}, {"k": "para", "s": "REALIZE CLUBを使うかもしれない。"}, {"k": "para", "s": "LMPへ相談するかもしれない。"}, {"k": "para", "s": "しかし、裏側では、すべてREALIZE OSが動いている。"}, {"k": "para", "s": "それでいい。"}, {"k": "para", "s": "OSとは、目立つために存在するものではない。"}, {"k": "para", "s": "支えるために存在するものだからである。"}, {"k": "para", "s": "人生支援を文化にするために一つの会社では、社会は変えられない。"}, {"k": "para", "s": "一つの商品でも、社会は変えられない。"}, {"k": "para", "s": "だから私たちは、企業と組む。"}, {"k": "para", "s": "地域と組む。"}, {"k": "para", "s": "教育機関と組む。"}, {"k": "para", "s": "専門家と組む。"}, {"k": "para", "s": "著名人と組む。"}, {"k": "para", "s": "行政とも協力する。"}, {"k": "para", "s": "人生支援は、一社だけでつくるものではない。"}, {"k": "para", "s": "社会全体で育てる文化なのである。"}, {"k": "head", "cls": "sec", "s": "第十一章の結び"}, {"k": "para", "s": "REALIZE OSは、商品ではない。"}, {"k": "para", "s": "OSである。"}, {"k": "para", "s": "だから、一つのブランドだけでは終わらない。"}, {"k": "para", "s": "様々な人と、様々な地域と、様々な企業と、様々な哲学とつながりながら、人生支援を社会へ届けていく。"}, {"k": "para", "s": "それが、REALIZE OSの提供モデルである。"}, {"k": "chap", "no": "第十二章", "title": "哲学承継", "sub": "人は、知識ではなく、人から学ぶ", "label": "第十二章　哲学承継"}, {"k": "head", "cls": "sec", "s": "人類は、哲学を承継することで発展してきた"}, {"k": "para", "s": "人類の歴史を振り返ると、文明は「知識」だけで発展したのではない。"}, {"k": "para", "s": "先人たちの考え方。"}, {"k": "para", "s": "価値観。"}, {"k": "para", "s": "生き方。"}, {"k": "para", "s": "挑戦。"}, {"k": "para", "s": "失敗。"}, {"k": "para", "s": "信念。"}, {"k": "para", "s": "そうしたものが、次の世代へ受け継がれてきたからこそ、人類は進歩してきた。"}, {"k": "para", "s": "本は、そのために生まれた。"}, {"k": "para", "s": "学校も、そのために生まれた。"}, {"k": "para", "s": "師弟関係も、そのために続いてきた。"}, {"k": "para", "s": "つまり、人類は昔から「哲学を承継する文化」によって成長してきたのである。"}, {"k": "head", "cls": "sec", "s": "人は、人から学ぶ"}, {"k": "para", "s": "同じ内容でも、誰が話すかで伝わり方は変わる。"}, {"k": "para", "s": "尊敬する先生。"}, {"k": "para", "s": "憧れの経営者。"}, {"k": "para", "s": "好きなアーティスト。"}, {"k": "para", "s": "応援しているアスリート。"}, {"k": "para", "s": "人は、「情報」だけで動くのではない。"}, {"k": "para", "s": "「この人のように生きたい。」"}, {"k": "para", "s": "その想いが、人を動かす。"}, {"k": "para", "s": "だから哲学とは、知識ではない。"}, {"k": "para", "s": "生き方そのものである。"}, {"k": "head", "cls": "sec", "s": "人生100年時代の新しい課題"}, {"k": "para", "s": "しかし、どれほど素晴らしい哲学も、人は永遠には生きられない。"}, {"k": "para", "s": "時代は変わる。"}, {"k": "para", "s": "世代も変わる。"}, {"k": "para", "s": "本人が引退する日も来る。"}, {"k": "para", "s": "その瞬間、多くの哲学は少しずつ社会から失われていく。"}, {"k": "para", "s": "本は残る。"}, {"k": "para", "s": "映像も残る。"}, {"k": "para", "s": "しかし、本当に残したいものは何だろうか。"}, {"k": "para", "s": "それは、「その人なら、どう考えるだろう。」"}, {"k": "para", "s": "という判断軸ではないだろうか。"}, {"k": "head", "cls": "sec", "s": "哲学承継とは何か"}, {"k": "para", "s": "REALIZE OSでは、哲学承継を次のように定義する。"}, {"k": "para", "s": "哲学承継とは、一人の人生を通して培われた価値観・判断軸・生き方を、AIと人生教育を通じて次世代へ受け継いでいく仕組みである。"}, {"k": "para", "s": "ここで重要なのは、人格の再現ではない。"}, {"k": "para", "s": "本人のコピーをつくることでもない。"}, {"k": "para", "s": "目指すのは、その人が人生を通して育んできた「判断軸」を未来へ届けることである。"}, {"k": "head", "cls": "sec", "s": "AIは、哲学を未来へ届ける"}, {"k": "para", "s": "AIは、人の代わりになるためにあるのではない。"}, {"k": "para", "s": "人が大切にしてきた考え方を、より多くの人へ届けるためにある。"}, {"k": "para", "s": "たとえば、世界王者を育て続けた指導者がいる。"}, {"k": "para", "s": "その人が大切にしてきた言葉。"}, {"k": "para", "s": "選手への向き合い方。"}, {"k": "para", "s": "困難との向き合い方。"}, {"k": "para", "s": "挑戦する姿勢。"}, {"k": "para", "s": "そうした哲学は、一人の競技だけにとどまらない。"}, {"k": "para", "s": "人生そのものにも通じる。"}, {"k": "para", "s": "AIは、その哲学を、24時間、必要なときに届けることができる。"}, {"k": "head", "cls": "sec", "s": "哲学は、押しつけるものではない"}, {"k": "para", "s": "REALIZE OSは、「この哲学が正しい」と押しつけることはしない。"}, {"k": "para", "s": "人には、それぞれ尊敬する人がいる。"}, {"k": "para", "s": "スポーツ選手から学ぶ人もいる。"}, {"k": "para", "s": "経営者から学ぶ人もいる。"}, {"k": "para", "s": "音楽家から勇気をもらう人もいる。"}, {"k": "para", "s": "芸術家から感性を学ぶ人もいる。"}, {"k": "para", "s": "だからREALIZE OSは、多様な哲学が共存する世界を目指す。"}, {"k": "para", "s": "共通するのは、「人生をより良くしたい」という願いだけである。"}, {"k": "head", "cls": "sec", "s": "哲学承継モデル"}, {"k": "para", "s": "哲学承継モデルでは、一人の人生を、一つのブランドとして残すのではない。"}, {"k": "para", "s": "一人の人生を、一つの学びとして残す。"}, {"k": "para", "s": "人生の歴史。"}, {"k": "para", "s": "大切にしてきた価値観。"}, {"k": "para", "s": "判断軸。"}, {"k": "para", "s": "人生教育。"}, {"k": "para", "s": "AI伴走。"}, {"k": "para", "s": "人生設計。"}, {"k": "para", "s": "これらを統合し、その人らしい人生支援プラットフォームをつくる。"}, {"k": "para", "s": "ファンは、応援するだけではない。"}, {"k": "para", "s": "共に学び、共に成長し、共に人生を歩んでいく。"}, {"k": "para", "s": "それが哲学承継モデルである。"}, {"k": "head", "cls": "sec", "s": "哲学は、未来への贈り物"}, {"k": "para", "s": "人生で得た経験は、その人だけの財産ではない。"}, {"k": "para", "s": "次の世代への贈り物でもある。"}, {"k": "para", "s": "失敗から学んだこと。"}, {"k": "para", "s": "挫折から立ち上がったこと。"}, {"k": "para", "s": "人を信じること。"}, {"k": "para", "s": "努力を続けること。"}, {"k": "para", "s": "諦めないこと。"}, {"k": "para", "s": "そうした経験は、誰かの人生を救うかもしれない。"}, {"k": "para", "s": "哲学承継とは、自分の人生を未来へ贈ることである。"}, {"k": "head", "cls": "sec", "s": "REALIZE OSが目指す未来"}, {"k": "para", "s": "これからの時代、AIはますます進化する。"}, {"k": "para", "s": "だからこそ、人間らしさの価値も高まる。"}, {"k": "para", "s": "人が生きてきた証。"}, {"k": "para", "s": "人が積み重ねてきた判断。"}, {"k": "para", "s": "人が残してきた言葉。"}, {"k": "para", "s": "それらを未来へ受け継ぐこと。"}, {"k": "para", "s": "REALIZE OSは、AIを使って人を消すのではない。"}, {"k": "para", "s": "AIを使って、人の想いを未来へつなぐ。"}, {"k": "para", "s": "それが、哲学承継である。"}, {"k": "head", "cls": "sec", "s": "第十二章の結び"}, {"k": "para", "s": "人生は有限である。"}, {"k": "para", "s": "しかし、その人が育んできた哲学は、未来へ受け継ぐことができる。"}, {"k": "para", "s": "哲学承継とは、過去を保存することではない。"}, {"k": "para", "s": "未来を育てることである。"}, {"k": "para", "s": "REALIZE OSは、一人ひとりの人生が、次の世代の希望となる社会を目指している。"}, {"k": "chap", "no": "第十三章", "title": "人生支援経営", "sub": "企業は、人生を支える時代へ", "label": "第十三章　人生支援経営"}, {"k": "head", "cls": "sec", "s": "企業の役割は変わり続けてきた"}, {"k": "para", "s": "企業は時代によって、求められる役割が変わってきた。"}, {"k": "para", "s": "高度経済成長期。"}, {"k": "para", "s": "企業の役割は、「大量に作ること」"}, {"k": "para", "s": "だった。"}, {"k": "para", "s": "その後、品質が求められた。"}, {"k": "para", "s": "サービスが求められた。"}, {"k": "para", "s": "ブランドが求められた。"}, {"k": "para", "s": "顧客満足が求められた。"}, {"k": "para", "s": "CSRが求められた。"}, {"k": "para", "s": "ESGが求められた。"}, {"k": "para", "s": "SDGsが求められた。"}, {"k": "para", "s": "人的資本経営が求められた。"}, {"k": "para", "s": "企業は、社会から求められる役割を、少しずつ広げながら発展してきた。"}, {"k": "para", "s": "人生100年時代。"}, {"k": "para", "s": "次に求められるもの。"}, {"k": "para", "s": "それは、人生支援経営である。"}, {"k": "para", "s": "働く人は、社員である前に、一人の人間である。"}, {"k": "para", "s": "社員には、人生がある。"}, {"k": "para", "s": "家族がある。"}, {"k": "para", "s": "子どもがいる。"}, {"k": "para", "s": "親がいる。"}, {"k": "para", "s": "住宅ローンがある。"}, {"k": "para", "s": "介護がある。"}, {"k": "para", "s": "健康がある。"}, {"k": "para", "s": "夢がある。"}, {"k": "para", "s": "会社では、仕事だけをしている訳ではない。"}, {"k": "para", "s": "仕事をしている「人生」"}, {"k": "para", "s": "そのものがある。"}, {"k": "para", "s": "だから、社員の人生が苦しくなれば、仕事にも影響する。"}, {"k": "para", "s": "家計不安。"}, {"k": "para", "s": "夫婦関係。"}, {"k": "para", "s": "親の介護。"}, {"k": "para", "s": "子どもの教育。"}, {"k": "para", "s": "健康問題。"}, {"k": "para", "s": "将来不安。"}, {"k": "para", "s": "これらは、会社の外の問題ではない。"}, {"k": "para", "s": "企業活動にも、必ず影響する。"}, {"k": "head", "cls": "sec", "s": "離職の本当の理由"}, {"k": "para", "s": "人は、給料だけで会社を辞めるのではない。"}, {"k": "para", "s": "仕事内容だけでもない。"}, {"k": "para", "s": "多くの場合、人生そのものが苦しくなっている。"}, {"k": "para", "s": "家庭の問題。"}, {"k": "para", "s": "将来への不安。"}, {"k": "para", "s": "人間関係。"}, {"k": "para", "s": "健康。"}, {"k": "para", "s": "お金。"}, {"k": "para", "s": "つまり、企業は仕事だけを見る時代から、人生を見る時代へ変わろうとしている。"}, {"k": "head", "cls": "sec", "s": "人生支援経営とは何か"}, {"k": "para", "s": "REALIZE OSでは、人生支援経営を次のように定義する。"}, {"k": "para", "s": "人生支援経営とは、社員を労働力としてではなく、一人の人生を歩む人として尊重し、その人生を支えることで、社員・企業・社会の持続的な成長を実現する経営である。"}, {"k": "para", "s": "ここで重要なのは、福利厚生を増やすことではない。"}, {"k": "para", "s": "制度を増やすことでもない。"}, {"k": "para", "s": "社員が、安心して人生を歩める環境をつくること。"}, {"k": "para", "s": "これが人生支援経営である。"}, {"k": "head", "cls": "sec", "s": "企業は人生の学校になる"}, {"k": "para", "s": "人生100年時代では、社会人になってからの方が、人生は長い。"}, {"k": "para", "s": "つまり、企業は、最も長く人が所属するコミュニティになる。"}, {"k": "para", "s": "だから、企業には、仕事だけではなく、人生を学べる環境が必要になる。"}, {"k": "para", "s": "人生健康診断。"}, {"k": "para", "s": "AI伴走。"}, {"k": "para", "s": "人生教育。"}, {"k": "para", "s": "人生設計。"}, {"k": "para", "s": "人生相談。"}, {"k": "para", "s": "社員が、安心して相談できる環境。"}, {"k": "para", "s": "これらは、福利厚生ではない。"}, {"k": "para", "s": "企業文化である。"}, {"k": "head", "cls": "sec", "s": "人生支援経営が企業を強くする"}, {"k": "para", "s": "社員が安心すると、挑戦できる。"}, {"k": "para", "s": "挑戦すると、成長する。"}, {"k": "para", "s": "成長すると、会社が成長する。"}, {"k": "para", "s": "会社が成長すると、地域が豊かになる。"}, {"k": "para", "s": "つまり、人生支援は、コストではない。"}, {"k": "para", "s": "未来への投資である。"}, {"k": "head", "cls": "sec", "s": "人生支援経営は、採用も変える"}, {"k": "para", "s": "これからの若者は、給料だけで会社を選ばない。"}, {"k": "para", "s": "働きがい。"}, {"k": "para", "s": "成長。"}, {"k": "para", "s": "安心。"}, {"k": "para", "s": "人間関係。"}, {"k": "para", "s": "価値観。"}, {"k": "para", "s": "人生。"}, {"k": "para", "s": "これらを重視する時代になる。"}, {"k": "para", "s": "その時、人生支援経営を実践している企業は、選ばれる企業になる。"}, {"k": "head", "cls": "sec", "s": "人生支援経営は、企業だけのためではない"}, {"k": "para", "s": "社員が幸せになる。"}, {"k": "para", "s": "家族も幸せになる。"}, {"k": "para", "s": "子どもも安心する。"}, {"k": "para", "s": "地域も元気になる。"}, {"k": "para", "s": "結果として、企業も発展する。"}, {"k": "para", "s": "つまり、人生支援経営とは、企業利益と社会貢献を対立させない経営である。"}, {"k": "head", "cls": "sec", "s": "REALIZE CLUBの使命"}, {"k": "para", "s": "REALIZE CLUBは、福利厚生サービスではない。"}, {"k": "para", "s": "社員教育サービスでもない。"}, {"k": "para", "s": "人生支援経営を、企業の中へ届けるためのOSである。"}, {"k": "para", "s": "人生100年時代。"}, {"k": "para", "s": "企業は、利益を生み出す場所だけではない。"}, {"k": "para", "s": "人生を支える場所になる。"}, {"k": "head", "cls": "sec", "s": "第十三章の結び"}, {"k": "para", "s": "企業は、社会を支える存在である。"}, {"k": "para", "s": "そして、社員は、企業を支える存在である。"}, {"k": "para", "s": "だから、社員の人生を支えることは、企業の未来を支えることでもある。"}, {"k": "para", "s": "人生支援経営とは、利益と人を対立させない。"}, {"k": "para", "s": "企業と人生を分けない。"}, {"k": "para", "s": "人生100年時代の、新しい経営哲学である。"}, {"k": "chap", "no": "第十四章", "title": "人生支援社会", "sub": "誰も一人にしない社会へ", "label": "第十四章　人生支援社会"}, {"k": "head", "cls": "sec", "s": "社会は、人を支えるためにある"}, {"k": "para", "s": "人は、一人では生きていけない。"}, {"k": "para", "s": "どれほど強い人でも、赤ちゃんの頃は誰かに育てられ、大人になれば誰かと働き、歳を重ねれば誰かに支えられる。"}, {"k": "para", "s": "人生とは、支え合いの連続である。"}, {"k": "para", "s": "しかし現代社会では、その「支え合い」が少しずつ弱くなっている。"}, {"k": "para", "s": "地域とのつながりは薄れ、近所付き合いは減り、核家族化が進み、一人で悩みを抱える人が増えた。"}, {"k": "para", "s": "便利にはなった。"}, {"k": "para", "s": "豊かにもなった。"}, {"k": "para", "s": "それでも、孤独は減っていない。"}, {"k": "para", "s": "不安も減っていない。"}, {"k": "para", "s": "つまり、社会は発展したが、人生を支える仕組みは十分に発展していないのである。"}, {"k": "head", "cls": "sec", "s": "支援は「困ってから」では遅い"}, {"k": "para", "s": "現代社会の多くの支援制度は、問題が起きてから動き始める。"}, {"k": "para", "s": "失業してから。"}, {"k": "para", "s": "病気になってから。"}, {"k": "para", "s": "離婚してから。"}, {"k": "para", "s": "生活が苦しくなってから。"}, {"k": "para", "s": "虐待が起きてから。"}, {"k": "para", "s": "自殺を考えてから。"}, {"k": "para", "s": "もちろん、それらの支援は必要である。"}, {"k": "para", "s": "しかし、本当に目指すべき社会は、困った人を助ける社会だけではない。"}, {"k": "para", "s": "困らないように支える社会である。"}, {"k": "para", "s": "予防が文化になれば、救える人生はもっと増える。"}, {"k": "head", "cls": "sec", "s": "人生支援社会とは何か"}, {"k": "para", "s": "REALIZE OSでは、人生支援社会を次のように定義する。"}, {"k": "para", "s": "人生支援社会とは、一人ひとりが人生の節目ごとに、学び、相談し、支え合いながら、自分らしい人生を歩める社会である。"}, {"k": "para", "s": "人生支援社会では、人生の悩みを一人で抱え込まない。"}, {"k": "para", "s": "誰もが、安心して相談できる。"}, {"k": "para", "s": "誰もが、人生を学べる。"}, {"k": "para", "s": "誰もが、自分の未来を設計できる。"}, {"k": "para", "s": "それが当たり前になる。"}, {"k": "head", "cls": "sec", "s": "学校の役割"}, {"k": "para", "s": "学校は、学力を育てる場所である。"}, {"k": "para", "s": "しかし、人生100年時代には、人生を考える力も必要になる。"}, {"k": "para", "s": "お金との向き合い方。"}, {"k": "para", "s": "働く意味。"}, {"k": "para", "s": "家族。"}, {"k": "para", "s": "健康。"}, {"k": "para", "s": "住まい。"}, {"k": "para", "s": "老後。"}, {"k": "para", "s": "災害。"}, {"k": "para", "s": "人生の六つの土台。"}, {"k": "para", "s": "これらを知ることは、社会へ出る準備でもある。"}, {"k": "para", "s": "学校教育を否定するのではない。"}, {"k": "para", "s": "学校教育を補完する。"}, {"k": "para", "s": "それが人生教育である。"}, {"k": "head", "cls": "sec", "s": "家庭の役割"}, {"k": "para", "s": "家庭は、最初の人生教育の場である。"}, {"k": "para", "s": "親は、子どもに価値観を伝える。"}, {"k": "para", "s": "愛情を伝える。"}, {"k": "para", "s": "生き方を伝える。"}, {"k": "para", "s": "しかし、親自身も人生100年時代を初めて生きる。"}, {"k": "para", "s": "だからこそ、親にも人生支援が必要になる。"}, {"k": "para", "s": "親が安心すれば、子どもも安心する。"}, {"k": "para", "s": "人生支援は、家庭を守る文化でもある。"}, {"k": "head", "cls": "sec", "s": "企業の役割"}, {"k": "para", "s": "企業は、働く場所だけではない。"}, {"k": "para", "s": "人生を育てる場所でもある。"}, {"k": "para", "s": "社員が人生を学び、相談し、挑戦できる環境。"}, {"k": "para", "s": "人生支援経営とは、社員の人生を大切にする文化を育てることである。"}, {"k": "para", "s": "社員が安心すれば、企業も強くなる。"}, {"k": "para", "s": "企業が強くなれば、地域も豊かになる。"}, {"k": "head", "cls": "sec", "s": "地域の役割"}, {"k": "para", "s": "昔、地域には、自然と相談できる人がいた。"}, {"k": "para", "s": "近所のおじさん。"}, {"k": "para", "s": "商店街の店主。"}, {"k": "para", "s": "親戚。"}, {"k": "para", "s": "地域のつながり。"}, {"k": "para", "s": "しかし、今はそうした関係が少なくなった。"}, {"k": "para", "s": "だからこそ、新しい地域の支え合いが必要になる。"}, {"k": "para", "s": "LMPは、その入り口になる。"}, {"k": "para", "s": "人生相談窓口がある街。"}, {"k": "para", "s": "安心して暮らせる街。"}, {"k": "para", "s": "人生支援社会は、地域から育っていく。"}, {"k": "head", "cls": "sec", "s": "AIの役割"}, {"k": "para", "s": "AIは、人を孤立させる技術ではない。"}, {"k": "para", "s": "人をつなぐ技術である。"}, {"k": "para", "s": "24時間寄り添う。"}, {"k": "para", "s": "相談を受ける。"}, {"k": "para", "s": "不安を整理する。"}, {"k": "para", "s": "そして、必要なときには、人へつなぐ。"}, {"k": "para", "s": "AIは、最後まで一人で抱え込ませない。"}, {"k": "para", "s": "それが、人生支援AIの役割である。"}, {"k": "head", "cls": "sec", "s": "専門家の役割"}, {"k": "para", "s": "人生支援社会では、専門家同士が競争しない。"}, {"k": "para", "s": "連携する。"}, {"k": "para", "s": "医療。"}, {"k": "para", "s": "住宅。"}, {"k": "para", "s": "保険。"}, {"k": "para", "s": "介護。"}, {"k": "para", "s": "法律。"}, {"k": "para", "s": "教育。"}, {"k": "para", "s": "金融。"}, {"k": "para", "s": "すべてが、人生という一本の線でつながる。"}, {"k": "para", "s": "人生支援とは、専門家を増やすことではない。"}, {"k": "para", "s": "専門家をつなぐことである。"}, {"k": "head", "cls": "sec", "s": "人生支援社会が実現した未来"}, {"k": "para", "s": "子どもが生まれる。"}, {"k": "para", "s": "人生健康診断を受ける。"}, {"k": "para", "s": "AIが伴走する。"}, {"k": "para", "s": "人生教育を学ぶ。"}, {"k": "para", "s": "人生設計を描く。"}, {"k": "para", "s": "必要になれば、人生相談をする。"}, {"k": "para", "s": "また人生健康診断を受ける。"}, {"k": "para", "s": "人生は、アップデートされ続ける。"}, {"k": "para", "s": "その文化が、社会に根付いている。"}, {"k": "para", "s": "誰も、一人で人生を抱え込まない。"}, {"k": "para", "s": "それが、人生支援社会である。"}, {"k": "head", "cls": "sec", "s": "第十四章の結び"}, {"k": "para", "s": "社会は、競争だけで発展するものではない。"}, {"k": "para", "s": "支え合うことで、持続していく。"}, {"k": "para", "s": "人生支援社会とは、困った人だけを助ける社会ではない。"}, {"k": "para", "s": "すべての人が、人生を学び、人生を設計し、人生を支え合う社会である。"}, {"k": "para", "s": "REALIZE OSは、その未来を実現するための基盤となる。"}, {"k": "chap", "no": "最終章", "title": "未来への約束", "sub": "子どもたちへ明るい未来をつなぐ", "label": "最終章　未来への約束"}, {"k": "head", "cls": "sec", "s": "私たちは、未来を生きることはできない"}, {"k": "para", "s": "私たちは、100年後の世界を見ることはできない。"}, {"k": "para", "s": "200年後の子どもたちに会うこともできない。"}, {"k": "para", "s": "私たちの人生には限りがある。"}, {"k": "para", "s": "しかし、一つだけできることがある。"}, {"k": "para", "s": "未来へ残すこと。"}, {"k": "para", "s": "私たちの知恵を。"}, {"k": "para", "s": "経験を。"}, {"k": "para", "s": "失敗を。"}, {"k": "para", "s": "哲学を。"}, {"k": "para", "s": "優しさを。"}, {"k": "para", "s": "そして、希望を。"}, {"k": "head", "cls": "sec", "s": "私たちは、どんな社会を残したいのか"}, {"k": "para", "s": "便利な社会だろうか。"}, {"k": "para", "s": "豊かな社会だろうか。"}, {"k": "para", "s": "AIが発達した社会だろうか。"}, {"k": "para", "s": "もちろん、それも大切である。"}, {"k": "para", "s": "しかし、私たちが本当に残したいものは違う。"}, {"k": "para", "s": "困ったときに相談できる社会。"}, {"k": "para", "s": "挑戦したい人を応援する社会。"}, {"k": "para", "s": "家族を大切にできる社会。"}, {"k": "para", "s": "子どもたちが未来に希望を持てる社会。"}, {"k": "para", "s": "人と人が支え合うことを当たり前と思える社会。"}, {"k": "para", "s": "それが、私たちの目指す未来である。"}, {"k": "head", "cls": "sec", "s": "人生は、一人のものではない"}, {"k": "para", "s": "私たちの今日の判断は、自分だけの未来をつくるものではない。"}, {"k": "para", "s": "親の生き方は、子どもに伝わる。"}, {"k": "para", "s": "子どもの姿は、次の世代へ伝わる。"}, {"k": "para", "s": "一人の優しさは、誰かの勇気になる。"}, {"k": "para", "s": "一人の挑戦は、誰かの希望になる。"}, {"k": "para", "s": "人生は、つながっている。"}, {"k": "para", "s": "だから、私たちは未来に責任を持ちたい。"}, {"k": "head", "cls": "sec", "s": "子どもたちに残したいもの"}, {"k": "para", "s": "私たちは、お金だけを残したいわけではない。"}, {"k": "para", "s": "建物だけを残したいわけでもない。"}, {"k": "para", "s": "会社だけを残したいわけでもない。"}, {"k": "para", "s": "残したいのは、人生を大切にする文化である。"}, {"k": "para", "s": "人生を学ぶ文化。"}, {"k": "para", "s": "人生を支え合う文化。"}, {"k": "para", "s": "人生を設計する文化。"}, {"k": "para", "s": "人生を相談できる文化。"}, {"k": "para", "s": "そして、人生を諦めない文化である。"}, {"k": "head", "cls": "sec", "s": "人生支援という文化"}, {"k": "para", "s": "私たちは信じている。"}, {"k": "para", "s": "人は、正しい判断軸を持てば、何度でも立ち上がることができる。"}, {"k": "para", "s": "人は、支えられることで、誰かを支えられるようになる。"}, {"k": "para", "s": "人は、愛されることで、愛を与えられるようになる。"}, {"k": "para", "s": "だから人生支援とは、誰かを弱くするものではない。"}, {"k": "para", "s": "人の中にある力を信じ、その力を引き出す文化なのである。"}, {"k": "para", "s": "REALIZE OSが約束すること私たちは約束する。"}, {"k": "para", "s": "人を不安で動かさない。"}, {"k": "para", "s": "人を支配しない。"}, {"k": "para", "s": "人を依存させない。"}, {"k": "para", "s": "人を比べない。"}, {"k": "para", "s": "人を諦めない。"}, {"k": "para", "s": "私たちは、一人ひとりが、自分らしい人生を歩めるように、人生を支え続ける。"}, {"k": "head", "cls": "sec", "s": "私たちが信じる未来"}, {"k": "para", "s": "人生健康診断が当たり前になる未来。"}, {"k": "para", "s": "人生教育を受けることが当たり前になる未来。"}, {"k": "para", "s": "人生設計を描くことが当たり前になる未来。"}, {"k": "para", "s": "AIが、人を孤独から守る未来。"}, {"k": "para", "s": "企業が、社員の人生を支える未来。"}, {"k": "para", "s": "地域に人生相談窓口がある未来。"}, {"k": "para", "s": "尊敬する人の哲学が、世代を超えて受け継がれる未来。"}, {"k": "para", "s": "子どもたちが、「大人になるのが楽しみ。」"}, {"k": "para", "s": "そう言える未来。"}, {"k": "para", "s": "その未来を、私たちは本気で実現したい。"}, {"k": "head", "cls": "sec", "s": "未来は、誰かがつくるものではない"}, {"k": "para", "s": "未来は、待つものではない。"}, {"k": "para", "s": "誰かが与えてくれるものでもない。"}, {"k": "para", "s": "未来は、今日の判断から生まれる。"}, {"k": "para", "s": "今日の学びから生まれる。"}, {"k": "para", "s": "今日の挑戦から生まれる。"}, {"k": "para", "s": "そして、今日、誰かを支えた優しさから生まれる。"}, {"k": "para", "s": "子どもたちへもし、いつかこの本を読む日が来たなら、どうか覚えていてほしい。"}, {"k": "para", "s": "君たちの未来を、本気で考えた大人たちがいたことを。"}, {"k": "para", "s": "便利な社会をつくるだけではなく、安心して生きられる社会を残そうとした人たちがいたことを。"}, {"k": "para", "s": "そして、君たちがまた、次の世代へ希望をつないでくれることを。"}, {"k": "para", "s": "それが、私たちの願いである。"}, {"k": "chap", "no": "", "title": "終章", "sub": "", "label": "終章"}, {"k": "para", "s": "人生は、判断の積み重ねである。"}, {"k": "para", "s": "だから、判断軸は人生を守る。"}, {"k": "para", "s": "人生は、支え合うことで豊かになる。"}, {"k": "para", "s": "だから、人生支援は未来を守る。"}, {"k": "para", "s": "私たちは、人生100年時代を生きるすべての人が、安心して挑戦し、安心して家族を愛し、安心して歳を重ねられる社会を目指す。"}, {"k": "para", "s": "そのために、REALIZE OSは存在する。"}, {"k": "para", "s": "REALIZE OS人生100年時代の人生支援OS人生をアップデートしよう。"}, {"k": "end"}], COVER="<img class=\"coverimg\" src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAR0AvgDASIAAhEBAxEB/8QAHQAAAgIDAQEBAAAAAAAAAAAAAAECAwQFBgcICf/EAGUQAAEDAgMEBAYKCBALCAMAAwEAAgMEEQUSIQYxQVEHE2FxFCIygZGhCBUjQlKxs8HR0hYzYnJ1kpOyJCY0NkNTVFZlc3SClKLh8CU1REZjZIOVo8LTFyc3RVWEtPEYhcOk4ob/xAAaAQADAQEBAQAAAAAAAAAAAAAAAQIDBAUG/8QANBEAAgIBAwIEBAYCAwEBAQEAAAECEQMSITFBUQQTMpEiYXHwFFKhsdHhgcEFQvEjMyQ0/9oADAMBAAIRAxEAPwD5aR5kLbYdgIrMPdXz4lRUMAm6gGcSEudlDtzGnSxWkpKKtkxi3sjUoW79osN/fPhX5Kf/AKaicFw4f5y4Yf8AZT/UUedH5+zK8tmmQtx7TYd++TDfyU/1Ee02Hfvjw38lP9RPzY/aYvLZp0WW4ODYeP8AOPDD/s5/qJe0+H/vhw78lN9RHmx+0w8tmoQtv7T4f++HDvyU31E/abD/AN8WHfkp/qI82Pz9mGhmnQtx7TYf++LDvyU/1Ee0+Hj/ADiw78lP9RHmx+0w0M06FuG4Nhx37R4cP9jP9RM4Lh/748N/JT/UR5sftMPLZpk1t/abD/3xYb+Sn+oonCKAf5w4ae6Ob6iPNX2mHl var reader=document.getElementById('reader'), pgt=document.getElementById('pgt');
var drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim'), dlist=document.getElementById('dlist');
var CPC=20, COLS=8, PAGES=[], chapPages=[];

function tokenize(s){
  var cells=[], em=false, i=0, n=s.length;
  while(i<n){
    if(s.charCodeAt(i)===42 && s.charCodeAt(i+1)===42){ em=!em; i+=2; continue; }
    var ch, c=s[i];
    var m=/^[0-9]{2,3}/.exec(i?s.slice(i):s);
    if(m){ ch='<span class="tcy">'+m[0]+'</span>'; i+=m[0].length; }
    else if(c==='↓'){ ch='<span class="arrow">↓</span>'; i++; }
    else { ch=(c==='<'?'&lt;':c==='&'?'&amp;':c); i++; }
    cells.push(em?'<b>'+ch+'</b>':ch);
  }
  return cells;
}
function measure(){
  // measure the INLINE span, not the col block: in vertical-rl a block's height
  // auto-fills the container (that skewed all previous math)
  var p=document.createElement('section'); p.className='page'; p.style.visibility='hidden';
  p.innerHTML='<div class="col"><span id="mprobe">'+Array(11).join('永')+'</span></div>';
  reader.appendChild(p);
  var sp=document.getElementById('mprobe'), r=sp.getBoundingClientRect();
  var charH=r.height/10, colW=p.firstChild.getBoundingClientRect().width;
  var cs=getComputedStyle(p);
  var innerH=p.clientHeight-parseFloat(cs.paddingTop)-parseFloat(cs.paddingBottom);
  var innerW=p.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  reader.removeChild(p);
  CPC=Math.max(8, Math.floor((innerH+0.5)/charH));
  COLS=Math.max(3, Math.floor((innerW+0.5)/colW));
}
var HANG=/^[、。！？」』・…]$/;   // never start a column with these
function build(){
  PAGES=[]; chapPages=[];
  var cols=[], cur=[], curCls='', curChap='表紙';
  function endCol(){ if(cur.length){ cols.push('<div class="col '+curCls+'">'+cur.join('')+'</div>'); } cur=[]; curCls='';
    if(cols.length>=COLS){ PAGES.push({type:'body',html:cols.join(''),chap:curChap}); cols=[]; } }
  function endPage(){ endCol(); if(cols.length){ PAGES.push({type:'body',html:cols.join(''),chap:curChap}); cols=[]; } }
  function cell(h){
    if(cur.length>=CPC){
      if(HANG.test(h.replace(/<[^>]+>/g,'')) && cur.length>1){
        var prev=cur.pop(); endCol(); cur.push(prev);   // 追い出し: keep punctuation with its char
      } else endCol();
    }
    cur.push(h);
  }
  function head(cells,cls){ endCol(); curCls=cls; for(var i=0;i<cells.length;i++){ if(cur.length>=CPC){ endCol(); curCls=cls; } cur.push(cells[i]); } endCol(); }
  PAGES.push({type:'cover',chap:'表紙'});
  for(var i=0;i<FLOW.length;i++){
    var it=FLOW[i];
    if(it.k==='chap'){ endPage(); curChap=it.label; PAGES.push({type:'chap',data:it,chap:it.label}); continue; }
    if(it.k==='end'){ endPage(); curChap='奥付'; PAGES.push({type:'end',chap:'奥付'}); continue; }
    if(it.k==='head'){ head(tokenize(it.s), it.cls); }
    else if(it.k==='para'){ endCol(); cell('　');    /* 段落: 新しい行＋一字下げ */
      var t=tokenize(it.s); for(var j=0;j<t.length;j++) cell(t[j]); }
    else { var t=tokenize(it.s); for(var j=0;j<t.length;j++) cell(t[j]); }
  }
  endPage();
}
function chapHTML(b){
  var s='<div class="cinner">';
  if(b.no) s+='<span class="cno">'+b.no+'</span><span class="g1"></span>';
  s+='<span class="ct">'+b.title+'</span>';
  if(b.sub) s+='<span class="g2"></span><span class="cs">'+b.sub+'</span>';
  return s+'</div>';
}
function render(){
  var h=[], tot=PAGES.length;
  for(var i=0;i<PAGES.length;i++){ var p=PAGES[i]; var badge='<span class="badge">'+(i+1)+' / '+tot+'</span>';
    if(p.type==='cover') h.push('<section class="page cover" data-c="表紙">'+COVER+'</section>');
    else if(p.type==='chap') h.push('<section class="page chap" data-c="'+p.chap+'">'+chapHTML(p.data)+badge+'</section>');
    else if(p.type==='end') h.push('<section class="page end" data-c="奥付">'+END+badge+'</section>');
    else h.push('<section class="page body" data-c="'+p.chap+'">'+p.html+badge+'</section>');
  }
  reader.innerHTML=h.join('');
  cards=[].slice.call(reader.querySelectorAll('.page'));
  chapPages=[]; PAGES.forEach(function(p,i){ if(p.type==='chap') chapPages.push({label:p.chap,i:i}); });
  buildTOC(); updateBar();
}
var cards=[];
function paginate(keepRatio){
  var ratio=(cards.length? reader.scrollTop/Math.max(1,reader.scrollHeight):0);
  measure(); build(); render();
  if(keepRatio) reader.scrollTop=ratio*reader.scrollHeight;
}
function curIndex(){
  var y=reader.scrollTop+8, best=0;
  for(var i=0;i<cards.length;i++){ if(cards[i].offsetTop-reader.offsetTop<=y) best=i; else break; }
  return best;
}
function updateBar(){ if(!cards.length) return; var i=curIndex();
  pgt.textContent=(i+1)+' / '+cards.length;
  var lis=dlist.children; for(var k=0;k<lis.length;k++) lis[k].classList.toggle('cur', chapPages[k] && cards[chapPages[k].i] && curIndex()>=chapPages[k].i && (k+1>=chapPages.length || curIndex()<chapPages[k+1].i));
}
function buildTOC(){ dlist.innerHTML='';
  chapPages.forEach(function(c){ var b=document.createElement('button'); b.className='di';
    b.textContent=c.label.replace('　',' ');
    b.onclick=function(){ closeD(); scrollToCard(c.i); };
    dlist.appendChild(b); });
}
function scrollToCard(i){ if(cards[i]) reader.scrollTo({top:cards[i].offsetTop-reader.offsetTop-14, behavior:'smooth'}); }
function openD(){ drawer.classList.add('on'); scrim.classList.add('on'); }
function closeD(){ drawer.classList.remove('on'); scrim.classList.remove('on'); }
document.getElementById('menu').onclick=openD;
document.getElementById('dx').onclick=closeD; scrim.onclick=closeD;
document.getElementById('prev').onclick=function(){ scrollToCard(Math.max(0,curIndex()-1)); };
document.getElementById('next').onclick=function(){ scrollToCard(Math.min(cards.length-1,curIndex()+1)); };
var tk; reader.addEventListener('scroll',function(){ clearTimeout(tk); tk=setTimeout(updateBar,50); },{passive:true});
paginate(false);
var rt; function repl(){ clearTimeout(rt); rt=setTimeout(function(){ paginate(true); },250); }
addEventListener('resize',repl); addEventListener('orientationchange',repl);
</script></body></html>
